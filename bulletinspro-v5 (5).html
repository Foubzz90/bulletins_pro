<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:#0f172a;min-height:100vh;-webkit-font-smoothing:antialiased}
:root{
  --tl:#0d9488;--tll:#e6fffa;--tld:#065f56;--tl1:#99e6d8;--tlg:linear-gradient(135deg,#0d9488,#0891b2);
  --rd:#e53e3e;--rdl:#fff5f5;--rdd:#c53030;
  --gn:#38a169;--gnl:#f0fff4;--gnd:#276749;
  --am:#d97706;--aml:#fffbeb;
  --bl:#3182ce;--bll:#ebf8ff;
  --pu:#7c3aed;--pul:#faf5ff;--pul2:#ede9fe;
  --in:#667eea;
  --bd:#e2e8f0;--bd2:#cbd5e0;--ca:#ffffff;--bg:#f0f4f8;--bg2:#f7fafc;--bg3:#edf2f7;
  --tx:#0f172a;--mu:#64748b;--tr:#a0aec0;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 4px 12px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.06);
  --sh3:0 10px 30px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.08);
  --r6:6px;--r8:8px;--r10:10px;--r12:12px;--r16:16px;--r20:20px;
}
/* LAYOUT */
#app{max-width:960px;margin:0 auto;min-height:100vh}
.topbar{background:var(--tlg);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-radius:0 0 var(--r16) var(--r16);box-shadow:var(--sh2)}
.topbar h1{color:#fff;font-size:16px;font-weight:800;letter-spacing:-.3px}
.topbar p{color:rgba(255,255,255,.8);font-size:11px;margin-top:1px}
.topbar-r{display:flex;align-items:center;gap:8px}
.av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.25);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;cursor:pointer;border:2px solid rgba(255,255,255,.4);transition:all .2s}
.av:hover{background:rgba(255,255,255,.35)}
.nb-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s}
.nb-btn:hover{background:rgba(255,255,255,.25)}
.nb-badge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:#ff4444;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--tl)}
/* NAV */
.nav{display:flex;background:var(--ca);border-bottom:1px solid var(--bd);overflow-x:auto;padding:0 10px;scrollbar-width:none;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.nav::-webkit-scrollbar{display:none}
.nb{padding:10px 12px;font-size:13px;background:none;border:none;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;white-space:nowrap;font-weight:600;transition:all .2s;letter-spacing:-.1px}
.nb:hover{color:var(--tl)}
.nb.on{color:var(--tl);border-bottom-color:var(--tl);font-weight:700}
/* PAGES */
.pg{padding:16px;background:var(--bg)}
/* CARDS */
.card{background:var(--ca);border:1px solid var(--bd);border-radius:var(--r12);padding:16px 18px;margin-bottom:12px;box-shadow:var(--sh)}
.card-flat{background:var(--ca);border:1px solid var(--bd);border-radius:var(--r12);padding:14px 16px;margin-bottom:10px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:6px}
.ct{font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-.2px}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
/* STAT CARDS */
.sc{background:var(--bg2);border-radius:var(--r10);padding:14px;text-align:center;border:1px solid var(--bd)}
.sl{font-size:11px;color:var(--mu);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.sv{font-size:22px;font-weight:800;color:var(--tx);letter-spacing:-.5px}
/* KPI CARDS — more prominent */
.kpi{background:var(--ca);border-radius:var(--r12);padding:16px;border:1px solid var(--bd);box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi-label{font-size:11px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:800;letter-spacing:-.5px}
.kpi-sub{font-size:11px;color:var(--mu);margin-top:2px}
.kpi-bar{position:absolute;bottom:0;left:0;height:3px;border-radius:0 var(--r6) 0 0}
/* FORMS */
.fi{padding:10px 12px;border:1.5px solid var(--bd);border-radius:var(--r8);font-size:14px;background:var(--ca);color:var(--tx);width:100%;transition:border .2s,box-shadow .2s;font-family:inherit}
.fi:focus{outline:none;border-color:var(--tl);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
.fi:hover:not(:focus){border-color:var(--bd2)}
.fl{font-size:12px;font-weight:700;color:var(--mu);display:block;margin-bottom:5px;letter-spacing:-.1px}
.fg{margin-bottom:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--r8);font-size:12px;cursor:pointer;border:1.5px solid var(--bd);background:var(--ca);color:var(--tx);font-weight:700;transition:all .2s;white-space:nowrap;letter-spacing:-.1px}
.btn:hover{background:var(--bg3);border-color:var(--bd2);transform:translateY(-1px);box-shadow:var(--sh)}
.btn:active{transform:translateY(0);box-shadow:none}
.bp{background:var(--tl);color:#fff;border-color:var(--tl)}
.bp:hover{background:var(--tld);border-color:var(--tld)}
.brd{background:var(--rdl);color:var(--rd);border-color:#fca5a5}
.bgn{background:var(--gnl);color:var(--gn);border-color:#9ae6b4}
.bam{background:var(--aml);color:var(--am);border-color:#fde68a}
.bpu{background:var(--pul2);color:var(--pu);border-color:#c4b5fd}
.bsm{padding:5px 10px;font-size:11px}
/* BADGES */
.bk{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:-.1px}
.bkg{background:#c6f6d5;color:var(--gnd)}
.bkr{background:#fed7d7;color:var(--rdd)}
.bka{background:#fefcbf;color:#92400e}
.bkt{background:var(--tll);color:var(--tld)}
.bkb{background:#bee3f8;color:#2c5282}
.bkx{background:var(--bg3);color:var(--mu)}
.bkp{background:var(--pul2);color:var(--pu)}
.bki{background:#e0e7ff;color:#3730a3}
/* ROWS */
.row{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--bd);border-radius:var(--r10);margin-bottom:8px;background:var(--ca);cursor:pointer;transition:all .2s;box-shadow:var(--sh)}
.row:hover{border-color:var(--tl);box-shadow:var(--sh2);transform:translateY(-1px)}
.row:active{transform:translateY(0)}
.rf{font-size:13px;font-weight:700;color:var(--tx);letter-spacing:-.2px}
.rm{font-size:11px;color:var(--mu);margin-top:1px}
/* PROGRESS */
.prog{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:9px 12px;font-size:11px;font-weight:700;color:var(--mu);border-bottom:1.5px solid var(--bd);background:var(--bg2);white-space:nowrap;letter-spacing:.02em;text-transform:uppercase}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--bd);color:var(--tx)}
.tbl tr.sub td{background:var(--bg2);font-weight:700;border-top:1.5px solid var(--bd)}
.tbl tr.tot td{font-size:14px;font-weight:800;border-top:2px solid var(--bd2);padding:14px 12px;background:var(--tll)}
.tbl tr:hover td{background:var(--bg2)}
.tbl tr:last-child td{border-bottom:none}
/* ALERTS */
.al{padding:12px 14px;border-radius:var(--r8);font-size:12px;margin-bottom:10px;line-height:1.5;border-left:3px solid}
.al-a{background:var(--aml);border-color:var(--am);color:#78350f}
.al-g{background:var(--gnl);border-color:var(--gn);color:#14532d}
.al-r{background:var(--rdl);border-color:var(--rd);color:var(--rdd)}
.al-t{background:var(--tll);border-color:var(--tl);color:var(--tld)}
.al-b{background:var(--bll);border-color:var(--bl);color:#1e3a5f}
.al-p{background:var(--pul);border-color:var(--pu);color:#4c1d95}
/* PULSE */
.pulse{width:8px;height:8px;border-radius:50%;background:#f59e0b;animation:pu 1.4s infinite;display:inline-block;flex-shrink:0}
@keyframes pu{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.5}}
.dot-g{width:8px;height:8px;border-radius:50%;background:var(--gn);display:inline-block;flex-shrink:0}
.dot-r{width:8px;height:8px;border-radius:50%;background:var(--rd);display:inline-block;flex-shrink:0}
/* MODAL */
.mwrap{background:rgba(15,23,42,.6);backdrop-filter:blur(4px);border-radius:var(--r12);padding:20px;display:flex;align-items:center;justify-content:center;min-height:300px;margin-bottom:12px}
.mbox{background:var(--ca);border-radius:var(--r16);border:1px solid var(--bd);padding:24px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:var(--sh3)}
.mtitle{font-size:17px;font-weight:800;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;letter-spacing:-.3px}
/* SPLIT LAYOUT */
.split{display:flex;gap:14px}
.sm{flex:1;min-width:0}
.ss2{width:250px;flex-shrink:0}
/* CHAUFFEUR */
.cfwrap{max-width:540px;margin:0 auto}
.bbtn{width:100%;padding:16px 18px;font-size:15px;border-radius:var(--r12);margin-bottom:10px;cursor:pointer;border:1.5px solid var(--bd);background:var(--ca);color:var(--tx);display:flex;align-items:center;justify-content:center;gap:10px;font-weight:700;transition:all .2s;line-height:1.3;box-shadow:var(--sh);letter-spacing:-.2px}
.bbtn:hover{transform:translateY(-1px);box-shadow:var(--sh2)}
.bbtn:active{transform:translateY(0)}
.bbp{background:var(--tlg);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(13,148,136,.3)}
.bbp:hover{box-shadow:0 6px 20px rgba(13,148,136,.4)}
.bbr{background:var(--rdl);color:var(--rd);border-color:#fca5a5}
/* COUNTER */
.ctr{display:flex;align-items:center;border:2px solid var(--bd);border-radius:var(--r12);overflow:hidden;width:fit-content;box-shadow:var(--sh)}
.cc{width:52px;height:56px;border:none;background:var(--bg2);font-size:26px;cursor:pointer;color:var(--tx);display:flex;align-items:center;justify-content:center;transition:background .15s;user-select:none;font-weight:300}
.cc:hover{background:var(--bg3)}
.cc:active{background:var(--bd)}
.cv{width:76px;height:56px;border:none;border-left:2px solid var(--bd);border-right:2px solid var(--bd);text-align:center;font-size:24px;font-weight:800;background:var(--ca);color:var(--tx);font-family:inherit}
/* CALC PREVIEW */
.calc{padding:14px;border-radius:var(--r10);font-size:13px;margin-top:10px;line-height:1.6;border:1px solid}
.calc-b{background:#ebf8ff;border-color:#bee3f8;color:#2c5282}
.calc-g{background:var(--gnl);border-color:#9ae6b4;color:var(--gnd)}
.calc-r{background:var(--rdl);border-color:#feb2b2;color:var(--rdd)}
/* TARIF LINE EDITOR */
.tline{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid var(--bd);border-radius:var(--r10);margin-bottom:8px;background:var(--ca);flex-wrap:wrap;box-shadow:var(--sh);transition:border .2s}
.tline:hover{border-color:var(--tl)}
.tline-mode{display:flex;border:1.5px solid var(--bd);border-radius:var(--r8);overflow:hidden}
.tline-mode button{padding:6px 11px;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
/* TABS inside pages */
.itabs{display:flex;border-bottom:1.5px solid var(--bd);margin-bottom:16px;overflow-x:auto;gap:2px}
.itab{padding:9px 14px;font-size:13px;background:none;border:none;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;white-space:nowrap;font-weight:600;transition:all .2s;border-radius:var(--r8) var(--r8) 0 0;margin-bottom:-1.5px}
.itab:hover{color:var(--tl);background:var(--tll)}
.itab.on{color:var(--tl);border-bottom-color:var(--tl);font-weight:700;background:var(--tll)}
/* NDOT */
.ndot{width:7px;height:7px;border-radius:50%;background:#ff4444;display:inline-block;margin-left:3px;vertical-align:middle;animation:pu 1.4s infinite}
/* PRIX BADGE */
.prix-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;background:var(--pul2);color:var(--pu)}
/* AVATAR CIRCLE */
.ava{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
/* LOGIN */
.login-w{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#667eea 0%,#0d9488 100%)}
.login-c{background:var(--ca);border-radius:var(--r20);padding:32px;width:100%;max-width:440px;box-shadow:var(--sh3)}
.acc-btn{width:100%;padding:14px 16px;border-radius:var(--r12);border:1.5px solid var(--bd);background:var(--ca);cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:10px;text-align:left;transition:all .2s;box-shadow:var(--sh)}
.acc-btn:hover{border-color:var(--tl);background:var(--tll);transform:translateY(-1px);box-shadow:var(--sh2)}
.acc-ico{width:46px;height:46px;border-radius:var(--r12);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
/* STEP INDICATOR (for rotation form) */
.step-label{font-size:10px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.step-label::before{content:'';display:block;width:18px;height:2px;background:var(--tl);border-radius:1px}
/* MOBILE BOTTOM NAV (chauffeur) */
.bottom-nav{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:540px;background:var(--ca);border-top:1px solid var(--bd);padding:6px 10px;z-index:200;gap:4px;box-shadow:0 -2px 10px rgba(0,0,0,.08)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border:none;background:none;cursor:pointer;border-radius:var(--r8);transition:background .15s;color:var(--mu)}
.bn.on{color:var(--tl)}
.bn-ico{font-size:20px;line-height:1}
.bn-lbl{font-size:10px;font-weight:700}
/* TOAST */
.toast-wrap{position:fixed;top:16px;right:16px;z-index:500;display:flex;flex-direction:column;gap:8px;max-width:320px}
.toast-item{padding:12px 16px;border-radius:var(--r10);color:#fff;font-size:13px;font-weight:700;box-shadow:var(--sh3);display:flex;align-items:center;gap:8px;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* SECTION DIVIDERS */
.sec-deb{border-left:4px solid var(--rd);padding-left:12px;margin-bottom:14px}
.sec-app{border-left:4px solid var(--gn);padding-left:12px;margin-bottom:14px}
.sec-reg{border-left:4px solid var(--bl);padding-left:12px;margin-bottom:14px}
.sec-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
/* DRIVER MOBILE PADDING */
.driver-pb{padding-bottom:80px}
/* CHART BARS */
.chart-bar{background:var(--bg3);border-radius:4px;overflow:hidden;height:8px}
.chart-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none!important}
  .bottom-nav{display:flex!important}
  div[style*="margin-left:220px"]{margin-left:0!important}
  .pg{padding:12px!important;padding-bottom:80px!important}
  .g3,.g4{grid-template-columns:1fr 1fr}
  .frow{grid-template-columns:1fr}
  .split{flex-direction:column}
  .ss2{width:100%}
  .tbl th:nth-child(n+5),.tbl td:nth-child(n+5){display:none}
  .cfwrap .pg{padding-bottom:90px}
}
@media(max-width:400px){.g2,.g3,.g4{grid-template-columns:1fr}}
@media(max-width:400px){.g2,.g3,.g4{grid-template-columns:1fr}}
@media(prefers-color-scheme:dark){
  :root{
    --bd:#334155;--bd2:#475569;--ca:#1e293b;--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
    --tx:#f1f5f9;--mu:#94a3b8;--tr:#64748b;
  }
  body{background:#0f172a;color:#f1f5f9}
  .login-w{background:linear-gradient(135deg,#1e1b4b 0%,#0f4c40 100%)}
}
</style>

// Options matériaux groupées par catégorie
function matOptions(tarifs, selMat){
  const cats = [...new Set(MATERIAUX_APPORT.map(m=>m.categorie))];
  return cats.map(cat=>{
    const items = MATERIAUX_APPORT.filter(m=>m.categorie===cat);
    const opts = items.map(m=>{
      const ta = tarifs?.find(x=>x.mat===m.nom);
      const label = ta
        ? `${m.nom}  ·  ${(ta.prix_m3||ta.prix||0).toFixed(2)} CHF/m³  /  ${(ta.prix_t||ta.prix||0).toFixed(2)} CHF/t`
        : m.nom;
      return `<option value="${m.nom}" ${m.nom===selMat?'selected':''} style="${!ta?'color:#a0aec0':''}">${label}</option>`;
    }).join('');
    return `<optgroup label="${cat}">${opts}</optgroup>`;
  }).join('');
}

// Options lieux de décharge avec tarif intégré si dispo
function lieuOptionsWithTarif(tarifs, selLieu){
  const grpA = LIEUX_DECHARGE.filter(l=>l.type==='A');
  const grpB = LIEUX_DECHARGE.filter(l=>l.type==='B');
  const grpX = LIEUX_DECHARGE.filter(l=>l.type==='autre');
  const makeOpts = (items) => items.map(l=>{
    const ta = tarifs?.find(x=>x.lieu===l.nom);
    const label = ta
      ? `${l.nom}  ·  ${(ta.prix_m3||ta.prix||0).toFixed(2)} CHF/m³  /  ${(ta.prix_t||ta.prix||0).toFixed(2)} CHF/t`
      : l.nom;
    return `<option value="${l.nom}" ${l.nom===selLieu?'selected':''} style="${!ta?'color:#a0aec0':''}">${label}</option>`;
  }).join('');
  return `
    <optgroup label="▼ Type A — Terres non polluées">${makeOpts(grpA)}</optgroup>
    <optgroup label="▼ Type B — Terres faiblement polluées">${makeOpts(grpB)}</optgroup>

}

const bulsCh=cId=>D.bulletins.filter(b=>b.cId===cId);
const lgsBul=bId=>D.lignes.filter(l=>l.bId===bId);
const lgsCh=cId=>{const ids=bulsCh(cId).map(b=>b.id);return D.lignes.filter(l=>ids.includes(l.bId));};

// Trouver le tarif d'une ligne pour un transporteur sur un chantier
function getTarifLigne(l, tr, cId){
  const tc=tr?.tarifs?.[cId];if(!tc)return null;
  if(l.type==='deblais') return tc.deblais?.find(x=>x.lieu===l.lieu)||null;
  return tc.apports?.find(x=>x.mat===l.mat)||null;
}

// Helper : prix selon le mode de saisie effectif de la ligne
function getPrixTarif(ta, saisieMode){
  if(!ta) return 0;
  // Nouvelle structure : prix_m3 + prix_t séparés
  if(ta.prix_m3!==undefined||ta.prix_t!==undefined){
    return saisieMode==='tonne' ? (ta.prix_t||0) : (ta.prix_m3||0);
  }
  // Ancienne structure : prix unique
  return ta.prix||0;
}

// Calculer qté et montant d'une ligne (respecte le mode de saisie réel du chauffeur)
function calcLigne(l, tr, cId){
  if(l.type==='regie') return calcRegie(l, tr, cId);
  const ta=getTarifLigne(l,tr,cId);
  if(!ta)return{qte:0,unit:'?',mnt:0,label:'tarif non défini'};
  const cap=ta.cap||tr?.capBenne||16;
  const sm=l.saisieMode||ta.mode_defaut||ta.mode||'benne';
  const prix=getPrixTarif(ta, sm);
  if(sm==='benne'){
    const v=l.voyages>0?l.voyages*cap:(l.v||l.t*0.75);
    const mnt=v*prix;
    const label=l.voyages>0?`${l.voyages} voy. × ${cap} m³ = ${num(v,0)} m³ × ${prix} CHF`:`${num(v,1)} m³ × ${prix} CHF`;
    return{qte:v,unit:'m³',mnt,label,prix};
  } else {
    const t=l.voyages>0?l.voyages*cap*0.75:l.t;
    const mnt=t*prix;
    const label=l.voyages>0?`${l.voyages} voy. ≈ ${num(t,0)} t × ${prix} CHF`:`${num(t,1)} t × ${prix} CHF`;
    return{qte:t,unit:'t',mnt,label,prix};
  }
}

// Calcul coût COMPLET d'une ligne : transport (payé transporteur) + taxe (payée décharge)
// Retourne {transport, taxe, total, tarifTransport, tarifTaxe, qte, unit, hasTaxe}
// Montant d'une ligne régie
function calcRegie(l, tr, cId){
  const taux = l.taux || tr?.tarifs?.[cId]?.tarifHeure || tr?.tarifHeure || 95;
  const mnt  = (l.h||0) * taux;
  return {qte:l.h||0, unit:'h', mnt, taux, label:`${l.h||0} h × ${taux} CHF/h`};
}

function calcCoutComplet(l, tr, cId){
  const ta = getTarifLigne(l, tr, cId);
  const grille = TAXES_GRILLE[cId]||{};
  const tx = l.type==='deblais' ? grille[l.lieu] : null; // taxes only on déblais
  const cap = ta?.cap || tr?.capBenne || 16;

  // Quantité commune
  let qte=0, unit='?';
  if(ta){
    if(ta.mode==='benne'){ qte = l.voyages>0?l.voyages*cap:(l.v||l.t*0.75); unit='m³'; }
    else                 { qte = l.voyages>0?l.voyages*cap*0.75:l.t;           unit='t';  }
  } else {
    // No tarif yet — estimate from raw data
    qte = l.voyages>0 ? l.voyages*cap : l.t||l.v||0;
    unit = l.voyages>0 ? 'm³' : 't';
  }

  // Transport — prix selon le mode de saisie réel du chauffeur
  const sm2 = l.saisieMode || ta?.mode_defaut || ta?.mode || 'benne';
  const transport = ta ? qte * getPrixTarif(ta, sm2) : 0;

  // Taxe décharge — use same quantity but converted to tax unit
  let taxe=0, qteTaxe=0;
  if(tx && l.type==='deblais'){
    const volBrut = l.voyages>0 ? l.voyages*cap : l.v||l.t*0.75;
    const tBrut   = l.voyages>0 ? l.voyages*cap*0.75 : l.t;
    qteTaxe = tx.unit==='m3' ? volBrut : tBrut;
    taxe    = qteTaxe * tx.tarif;
  }

  return {
    transport, taxe, total: transport+taxe,
    tarifTransport: ta?.prix||0, unitTransport: unit,
    tarifTaxe: tx?.tarif||0, unitTaxe: tx?.unit||null,
    qte, qteTaxe,
    hasTarif: !!ta, hasTaxe: !!tx && l.type==='deblais',
    cap,
  };
}

// Coût complet d'un bulletin entier
function coutBulletinComplet(bId, tr, cId){
  const ls = lgsBul(bId);
  let transport=0, taxe=0;
  ls.forEach(l=>{ const c=calcCoutComplet(l,tr,cId); transport+=c.transport; taxe+=c.taxe; });
  return {transport, taxe, total:transport+taxe, ls};
}

function lgnVolume(l,cap){
  if(l.voyages>0)return{t:(l.voyages*cap*0.75)||0,v:(l.voyages*cap)||0};
  return{t:l.t||0,v:l.v||(l.t||0)*0.75||0};
}
function totalT(ls,type,cap=16){return (ls||[]).filter(l=>!type||l.type===type).reduce((s,l)=>s+(lgnVolume(l,cap).t||0),0)||0;}
const avgAtt=ls=>ls.length?(ls.reduce((s,l)=>s+(l.att||0),0)/ls.length).toFixed(0):0;
const cName=cId=>{const c=D.chantiers.find(x=>x.id===cId);return c?`${c.code} — ${c.nom}`:''};
const unread=()=>NOTIFS.filter(n=>!n.read).length;
function addAudit(action,t='info'){AUDIT.unshift({time:th(),user:S.user?.nom||'Système',action,t});if(AUDIT.length>60)AUDIT.pop();}

// Récapitulatif facturation pour un transporteur sur un chantier
function buildRecap(tr,cId){
  const buls=D.bulletins.filter(b=>b.tId===tr.id&&b.cId===cId);
  const ls=D.lignes.filter(l=>buls.map(b=>b.id).includes(l.bId));
  const tc=tr.tarifs?.[cId];
  let tDeb=0,tApp=0,groups=[];
  // Grouper par lieu/mat
  const gmap={};
  ls.forEach(l=>{
    const key=l.type==='deblais'?(l.lieu+'|'+l.typeMatx):(l.mat+'|'+l.carriere);
    if(!gmap[key])gmap[key]={type:l.type,lieu:l.lieu,typeMatx:l.typeMatx||'',mat:l.mat,car:l.carriere||'',qte:0,v:0,t:0,unit:'?',mnt:0,n:0,mode:'?',prix:0,prix_m3:0,prix_t:0,cap:0};
    const g=gmap[key];
    const ta=getTarifLigne(l,tr,cId);
    const{qte,unit,mnt}=calcLigne(l,tr,cId);
    g.qte+=(qte||0);g.mnt+=(mnt||0);g.n++;
    if(ta){g.unit=unit;g.mode=ta.mode;g.prix=ta.prix;g.cap=ta.cap||tr.capBenne;}
  });
  Object.values(gmap).forEach(g=>{if(g.type==='deblais')tDeb+=g.mnt;else tApp+=g.mnt;groups.push(g);});
  // Régie
  const regLines=ls.filter(l=>l.type==='regie');
  let tReg=0;const regGroups=[];
  const rgmap={};
  regLines.forEach(l=>{
    const k=l.desc||'Régie';
    if(!rgmap[k])rgmap[k]={type:'regie',desc:k,h:0,taux:l.taux||tc?.tarifHeure||tr.tarifHeure||95,mnt:0,n:0};
    rgmap[k].h+=l.h||0; rgmap[k].mnt+=(l.h||0)*(l.taux||tc?.tarifHeure||tr.tarifHeure||95); rgmap[k].n++;
    tReg+=rgmap[k].mnt-(tReg); // accumulate
  });
  tReg=regLines.reduce((s,l)=>s+(l.h||0)*(l.taux||tc?.tarifHeure||tr.tarifHeure||95),0);
  Object.values(rgmap).forEach(g=>regGroups.push(g));
  const taux=tc?.tarifHeure||tr.tarifHeure||95;
  return{groups,regGroups,tDeb,tApp,tReg,taux,totalHT:tDeb+tApp+tReg,buls,ls};
}

function toast(msg,t='g'){
  // Append toast to DOM without full re-render
  const wrap=document.getElementById('toast-container')||createToastContainer();
  const el=document.createElement('div');
  const bg=t==='g'?'#38a169':t==='r'?'#e53e3e':t==='p'?'#7c3aed':'#d97706';
  const ico=t==='g'?'✓':t==='r'?'⚠':'💶';
  el.className='toast-item';
  el.style.background=bg;
  el.innerHTML=`<span style="font-size:16px">${ico}</span><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>{el.style.animation='slideIn .3s ease reverse';setTimeout(()=>el.remove(),300);},2800);
}
function createToastContainer(){
  const d=document.createElement('div');
  d.id='toast-container';d.className='toast-wrap';
  document.body.appendChild(d);return d;
}

function bindLogin(){
  const doLogin=async()=>{
    const email=(document.getElementById('auth-email')?.value||'').trim().toLowerCase();
    const pass  = document.getElementById('auth-pass')?.value||'';
    const btn   = document.getElementById('auth-login');

    if(!email){S.loginErr='Saisissez votre email.';render();return;}
    if(!pass) {S.loginErr='Saisissez votre mot de passe.';render();return;}
    if(btn){btn.disabled=true;btn.textContent='Connexion...';}

    // ── ESSAI SUPABASE D'ABORD ────────────────────────────────────────────────
    const sbOk = initSB();
    if(sbOk && SB){
      try{
        const{data,error}=await SB.auth.signInWithPassword({email,password:pass});
        if(!error && data?.user){
          // Succès Supabase — charger le profil
          await new Promise(r=>setTimeout(r,500)); // laisser le trigger créer le profil
          const{data:profile}=await SB.from('profiles').select('*').eq('id',data.user.id).single();
          if(profile){
            S.user={
              id:profile.id, nom:profile.nom, email:profile.email,
              role:profile.role, eId:'e1',
              av:profile.av||(profile.nom?.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2)),
              poste:profile.poste||'', actif:true,
              chantierIds:profile.chantier_ids||[],
              _sbSession:data.session
            };
            S.loginErr='';
            addAudit(`Connexion Supabase — ${S.user.nom}`,'info');
            await loadDataFromSupabase();
            if(btn)btn.disabled=false;
            routeByRole(S.user.role);
            return;
          }
        }
        // Supabase a répondu mais erreur ou pas de profil
        if(error){
          // Essayer le fallback local avant d'afficher une erreur
          const u=ACCOUNTS.find(a=>a.email===email&&a.pass===pass&&a.actif!==false);
          if(u){ loginLocal(u,btn); return; }
          S.loginErr = error.message==='Invalid login credentials'
            ? 'Email ou mot de passe incorrect.'
            : error.message;
          if(btn){btn.disabled=false;btn.textContent='Se connecter →';}
          render(); return;
        }
      }catch(netErr){
        console.warn('Supabase unavailable, trying local:', netErr.message);
        // Supabase inaccessible (offline, CORS, etc.) — fallback local
      }
    }

    // ── FALLBACK LOCAL ────────────────────────────────────────────────────────
    const u=ACCOUNTS.find(a=>a.email===email&&a.pass===pass&&a.actif!==false);
    if(u){ loginLocal(u,btn); return; }

    S.loginErr='Email ou mot de passe incorrect. Vérifiez vos identifiants.';
    if(btn){btn.disabled=false;btn.textContent='Se connecter →';}
    render();
  };

  function loginLocal(u,btn){
    S.user=u; S.loginErr='';
    addAudit(`Connexion locale — ${u.nom}`,'info');
    if(btn){btn.disabled=false;btn.textContent='Se connecter →';}
    routeByRole(u.role);
  }

  function routeByRole(role){
    S.authEmail='';
    if(role==='conducteur')      go('c_dash');
    else if(role==='chauffeur')  go('f_home');
    else if(role==='contremaitre') go('cm_home');
    else go('client');
  }

  document.getElementById('auth-login')?.addEventListener('click', doLogin);
  document.getElementById('auth-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('auth-email')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('auth-pass')?.focus();});

    const nom   = document.getElementById('signup-nom')?.value.trim();
    const email2= document.getElementById('signup-email')?.value.trim().toLowerCase();

    const btn2  = document.getElementById('auth-signup');

    if(!nom)           {S.loginErr='Le nom est obligatoire.';render();return;}
    if(!email2)        {S.loginErr="L'email est obligatoire.";render();return;}
    if(!pass2||pass2.length<8){S.loginErr='Mot de passe min. 8 caractères.';render();return;}
    if(btn2){btn2.disabled=true;btn2.textContent='Création...';}

    // Ajouter en local immédiatement
    const av=nom.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);
    const newU={id:'u'+uid(),nom,email:email2,pass:pass2,role:'conducteur',
      eId:'e1',av,poste:'Conducteur de travaux',actif:true,chantierIds:[],createdAt:td()};
    ACCOUNTS.push(newU);

    // Essayer aussi Supabase si disponible
    if(initSB()&&SB){
      try{
        const{data,error}=await SB.auth.signUp({email:email2,password:pass2,
          options:{data:{nom,role:'conducteur',av,poste:'Conducteur de travaux'}}});
        if(!error&&data?.user){
          await new Promise(r=>setTimeout(r,1000));
          await SB.from('profiles').upsert({
            id:data.user.id,nom,email:email2,role:'conducteur',av,
            poste:'Conducteur de travaux',actif:true,chantier_ids:[]
          });
          newU.id=data.user.id;
        }
      }catch(e){ console.warn('Supabase signup failed, local only:', e.message); }
    }

    S.authStep='email'; S.loginErr='';
    toast(`Compte de ${nom} créé ✓`,'g');
    // Auto-login
    S.user=newU;
    if(btn2){btn2.disabled=false;}
    go('c_dash');
  });
}

function bindCChantiers(){
  document.getElementById('save-ch')?.addEventListener('click',()=>{
    const code=document.getElementById('m-code').value.trim(),nom=document.getElementById('m-nom').value.trim(),cli=document.getElementById('m-cli').value.trim();
    if(!code||!nom||!cli){toast('Remplissez les champs obligatoires','r');return;}
    const eid=document.getElementById('save-ch').dataset.eid;
    const obj={code,nom,client:cli,adresse:document.getElementById('m-adr').value.trim(),
      budDeb:parseFloat(document.getElementById('m-bd').value)||0,budApp:parseFloat(document.getElementById('m-ba').value)||0};
    if(eid){
      const ch=D.chantiers.find(c=>c.id===eid);
      Object.assign(ch,obj);
      addAudit(`Chantier ${code} modifié`,'warn');
      sbSave('chantiers',{id:eid,...obj}).catch(()=>{});
    } else {
      const newCh={id:'c'+uid(),...obj,actif:true,date:td()};
      D.chantiers.push(newCh);
      addAudit(`Chantier ${code} créé`,'info');
      sbSave('chantiers',newCh).catch(()=>{});
    }
    toast(`Chantier ${eid?'modifié':'créé'} ✓`);S.modal=null;render();
  });
  document.querySelectorAll('.del-ch').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();if(!confirm('Supprimer ?'))return;
    const i=D.chantiers.findIndex(c=>c.id===b.dataset.id);if(i>=0)D.chantiers.splice(i,1);
    toast('Chantier supprimé');render();
  }));
}

function bindCChantier(){
  document.querySelectorAll('.sign-bul').forEach(b=>b.addEventListener('click',()=>{
    const bul=D.bulletins.find(x=>x.id===b.dataset.id);if(bul){bul.signed=true;addAudit(`${bul.num} signé`,'success');}toast('Signé ✓');render();
  }));
  document.querySelectorAll('.add-tr').forEach(b=>b.addEventListener('click',()=>{
    const t=D.transporteurs.find(x=>x.id===b.dataset.tid);
    if(t&&!t.chantierIds.includes(b.dataset.cid)){
      t.chantierIds.push(b.dataset.cid);
      // Initialiser une grille de tarifs vide pour ce nouveau chantier
      if(!t.tarifs)t.tarifs={};

      addAudit(`${t.nom} invité sur chantier — tarifs à définir`,'info');
      NOTIFS.unshift({id:'n'+uid(),msg:`${t.nom} invité — peut maintenant saisir ses tarifs`,time:th(),read:false,ico:'💶',bg:'#f5f3ff'});
    }
    toast('Transporteur ajouté — il peut maintenant définir ses tarifs ✓');S.modal=null;render();
  }));
  document.querySelectorAll('.rm-tr').forEach(b=>b.addEventListener('click',()=>{
    const t=D.transporteurs.find(x=>x.id===b.dataset.tid);

    toast('Transporteur retiré');render();
  }));
}

  const dateTo  = S.params.dt||'';
  const today   = new Date().toISOString().split('T')[0];

  // ── Date filtering helper ────────────────────────────────────────────────────
  function inPeriod(bul){
    const d=bul.date;
    if(selPer==='today')  return d===today;
    if(selPer==='week'){
      const dt=new Date(d), now=new Date();
      const mon=new Date(now); mon.setDate(now.getDate()-now.getDay()+(now.getDay()===0?-6:1));
      return dt>=mon;
    }
    if(selPer==='month') return d.slice(0,7)===today.slice(0,7);
    if(selPer==='custom'&& dateFrom&&dateTo) return d>=dateFrom&&d<=dateTo;
    return true;
  }

  // ── Filter data ──────────────────────────────────────────────────────────────
  const allBuls  = selCh==='all'?D.bulletins:D.bulletins.filter(b=>b.cId===selCh);
  const buls     = allBuls.filter(b=>inPeriod(b));
  const bulIds   = buls.map(b=>b.id);
  const ls       = D.lignes.filter(l=>bulIds.includes(l.bId));

  // ── Totaux ───────────────────────────────────────────────────────────────────
  const lsDeb    = ls.filter(l=>l.type==='deblais');
  const lsApp    = ls.filter(l=>l.type==='apport');
  const lsReg    = ls.filter(l=>l.type==='regie');
  let totalTransport=0, totalTaxe=0, totalRegie=0;
  buls.forEach(b=>{
    const tr=D.transporteurs.find(t=>t.id===b.tId);
    const cc=coutBulletinComplet(b.id,tr,b.cId);
    totalTransport+=cc.transport; totalTaxe+=cc.taxe;
  });
  totalRegie=lsReg.reduce((s,l)=>s+(l.h||0)*(l.taux||95),0);
  const tDeb=lsDeb.reduce((s,l)=>{const tr=D.transporteurs.find(t=>D.bulletins.some(b=>b.tId===t.id&&b.id===l.bId));const c=tr?.capBenne||16;return s+(l.voyages>0?l.voyages*c*0.75:l.t);},0);
  const tApp=lsApp.reduce((s,l)=>{const tr=D.transporteurs.find(t=>D.bulletins.some(b=>b.tId===t.id&&b.id===l.bId));const c=tr?.capBenne||16;return s+(l.voyages>0?l.voyages*c*0.75:l.t);},0);

  // ── Par lieu / matériau ──────────────────────────────────────────────────────
  const byLieu={};
  lsDeb.forEach(l=>{
    const k=l.lieu||'?';if(!byLieu[k])byLieu[k]={lieu:k,t:0,v:0,n:0,transport:0,taxe:0};
    const tr=D.transporteurs.find(t=>D.bulletins.some(b=>b.tId===t.id&&b.id===l.bId));
    const cc=calcCoutComplet(l,tr,D.bulletins.find(b=>b.id===l.bId)?.cId);
    const c=tr?.capBenne||16;
    byLieu[k].t+=(l.voyages>0?l.voyages*c*0.75:(l.t||0))||0;
    byLieu[k].v+=(l.voyages>0?l.voyages*c:(l.v||0))||0;
    byLieu[k].n++;byLieu[k].transport+=cc.transport;byLieu[k].taxe+=cc.taxe;
  });
  const byMat={};
  lsApp.forEach(l=>{
    const k=l.mat||'?';if(!byMat[k])byMat[k]={mat:k,t:0,v:0,n:0};
    const tr=D.transporteurs.find(t=>D.bulletins.some(b=>b.tId===t.id&&b.id===l.bId));
    const c=tr?.capBenne||16;
    byMat[k].t+=(l.voyages>0?l.voyages*c*0.75:(l.t||0))||0;
    byMat[k].v+=(l.voyages>0?l.voyages*c:(l.v||0))||0;
    byMat[k].n++;
  });

  // ── Par journée (timeline) ────────────────────────────────────────────────────
  const byDay={};
  buls.forEach(b=>{
    if(!byDay[b.date])byDay[b.date]={date:b.date,buls:0,rot:0};
    byDay[b.date].buls++;
    byDay[b.date].rot+=lgsBul(b.id).length;
  });
  const days=Object.values(byDay).sort((a,b)=>a.date.localeCompare(b.date));
  const maxDay=Math.max(...days.map(d=>d.rot),1);

  const perLabels={all:'Toute la période',today:"Aujourd'hui",week:'Cette semaine',month:'Ce mois',custom:'Personnalisé'};

  return cLayout(`
    <!-- Filtres -->
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <select class="fi" style="width:auto" id="stat-ch">
        <option value="all">Tous les chantiers</option>
        ${D.chantiers.filter(c=>c.actif).map(c=>`<option value="${c.id}" ${selCh===c.id?'selected':''}>${c.code} — ${c.nom}</option>`).join('')}
      </select>
      <div style="display:flex;gap:4px;border:1.5px solid var(--bd);border-radius:var(--r8);overflow:hidden">
        ${['all','today','week','month','custom'].map(p=>`
          <button onclick="go('c_stats',{cId:'${selCh}',per:'${p}',df:'${dateFrom}',dt:'${dateTo}'})"
            style="padding:7px 12px;border:none;font-size:12px;font-weight:700;cursor:pointer;
              background:${selPer===p?'var(--tl)':'var(--ca)'};color:${selPer===p?'#fff':'var(--mu)'}">${perLabels[p]}</button>`).join('')}
      </div>
      ${selPer==='custom'?`
        <input class="fi" type="date" id="stat-df" value="${dateFrom}" style="width:auto">
        <span style="color:var(--mu)">→</span>
        <input class="fi" type="date" id="stat-dt" value="${dateTo}" style="width:auto">
      `:''}
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="btn bp" onclick="exportRotationsExcel('${selCh==='all'?D.chantiers[0]?.id:selCh}')">↓ Excel</button>
        <button class="btn bpu" onclick="exportStatsPDF('${selCh}','${selPer}','${dateFrom}','${dateTo}')">↓ PDF Stats</button>
      </div>
    </div>

    <!-- KPIs -->
    <div class="g4" style="margin-bottom:14px">
      <div class="kpi"><div class="kpi-label">Bulletins</div><div class="kpi-value">${buls.length}</div><div class="kpi-sub">${ls.length} rotations · ${selPer==='all'?'total':perLabels[selPer]}</div><div class="kpi-bar" style="width:100%;background:var(--tl)"></div></div>
      <div class="kpi"><div class="kpi-label">Transport HT</div><div class="kpi-value" style="color:var(--bl);font-size:20px">${chf(totalTransport)}</div><div class="kpi-sub">payé transporteurs</div><div class="kpi-bar" style="width:100%;background:var(--bl)"></div></div>
      <div class="kpi"><div class="kpi-label">Taxes décharge HT</div><div class="kpi-value" style="color:var(--pu);font-size:20px">${chf(totalTaxe)}</div><div class="kpi-sub">payé décharges</div><div class="kpi-bar" style="width:100%;background:var(--pu)"></div></div>
      <div class="kpi"><div class="kpi-label">Coût total HT</div><div class="kpi-value" style="color:var(--tl);font-size:20px">${chf(totalTransport+totalTaxe+totalRegie)}</div><div class="kpi-sub">transport + taxes + régie</div><div class="kpi-bar" style="width:100%;background:var(--tl)"></div></div>
    </div>

    <!-- Timeline par journée -->
    ${days.length>1?`<div class="card" style="margin-bottom:12px">
      <div class="ch"><span class="ct">Activité par journée</span></div>
      ${days.map(d=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span style="font-size:11px;color:var(--mu);width:80px;flex-shrink:0">${d.date}</span>
        <div style="flex:1"><div class="prog"><div class="pf" style="width:${pct(d.rot,maxDay)}%;background:var(--tl)"></div></div></div>
        <span style="font-size:11px;font-weight:700;width:60px;text-align:right">${d.buls} bul · ${d.rot} rot</span>
      </div>`).join('')}
    </div>`:''}

    <div class="g2">
      <!-- Déblais par lieu -->
      <div class="card">
        <div class="ch"><span class="ct" style="color:var(--rd)">▼ Déblais par lieu</span></div>
        ${Object.values(byLieu).length===0?`<p style="font-size:12px;color:var(--mu)">Aucune donnée.</p>`:''}
        ${Object.values(byLieu).sort((a,b)=>b.t-a.t).map(g=>{
          const tot=Object.values(byLieu).reduce((s,x)=>s+x.t,0)||1;
          return`<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
              <span style="font-weight:700">${g.lieu}</span>
              <span style="font-weight:700;color:var(--rd)">${num(g.t,0)} t</span>
            </div>
            <div class="prog"><div class="pf" style="width:${pct(g.t,Math.round(tot*1.05))}%;background:var(--rd)"></div></div>
            <div style="display:flex;gap:10px;font-size:10px;color:var(--mu);margin-top:2px">
              <span>${num(g.v,0)} m³</span>
              <span>🚛 ${chf(g.transport)}</span>
              <span>🏭 ${chf(g.taxe)}</span>
              <span>= ${chf(g.transport+g.taxe)}</span>
            </div>
          </div>`;}).join('')}
      </div>

      <!-- Apports par matériau -->
      <div class="card">
        <div class="ch"><span class="ct" style="color:var(--gn)">▲ Apports par matériau</span></div>
        ${Object.values(byMat).length===0?`<p style="font-size:12px;color:var(--mu)">Aucune donnée.</p>`:''}
        ${Object.values(byMat).sort((a,b)=>b.t-a.t).map(g=>{
          const tot=Object.values(byMat).reduce((s,x)=>s+x.t,0)||1;
          return`<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
              <span style="font-weight:700">${g.mat}</span>
              <span style="font-weight:700;color:var(--gn)">${num(g.t,0)} t</span>
            </div>
            <div class="prog"><div class="pf" style="width:${pct(g.t,Math.round(tot*1.05))}%;background:var(--gn)"></div></div>
            <div style="font-size:10px;color:var(--mu);margin-top:2px">${num(g.v,0)} m³ · ${g.n} rotation(s)</div>
          </div>`;}).join('')}
      </div>
    </div>

    <!-- Tableau bulletins de la période -->
    <div class="card">
      <div class="ch">
        <span class="ct">Bulletins — ${perLabels[selPer]}</span>
        <button class="btn bp bsm" onclick="exportBulletinsListExcel('${selCh}','${selPer}','${dateFrom}','${dateTo}')">↓ Excel liste</button>
      </div>
      ${buls.length===0?`<p style="font-size:12px;color:var(--mu)">Aucun bulletin pour cette période.</p>`:`
      <div style="overflow-x:auto"><table class="tbl">
        <thead><tr><th>N° Bulletin</th><th>Date</th><th>Chantier</th><th>Transporteur</th>
          <th style="text-align:right">Rot.</th><th style="text-align:right">🚛 Transport</th>
          <th style="text-align:right">🏭 Taxe</th><th style="text-align:right">Total HT</th>
          <th></th></tr></thead>
        <tbody>${buls.map(b=>{
          const tr=D.transporteurs.find(t=>t.id===b.tId);
          const ch=D.chantiers.find(c=>c.id===b.cId);
          const cc=coutBulletinComplet(b.id,tr,b.cId);
          const nRot=lgsBul(b.id).length;
          return`<tr>
            <td style="font-weight:700;font-size:11px;font-family:monospace">${b.num}</td>
            <td style="color:var(--mu)">${b.date}</td>
            <td><span class="bk bkt" style="font-size:10px">${ch?.code||'?'}</span></td>
            <td style="font-size:12px">${tr?.nom||'?'}</td>
            <td style="text-align:right">${nRot}</td>
            <td style="text-align:right;color:var(--bl);font-weight:700">${cc.transport>0?chf(cc.transport):'—'}</td>
            <td style="text-align:right;color:var(--pu);font-weight:700">${cc.taxe>0?chf(cc.taxe):'—'}</td>
            <td style="text-align:right;font-weight:800;color:var(--tld)">${cc.total>0?chf(cc.total):'—'}</td>
            <td>
              <div style="display:flex;gap:3px">
                <button class="btn bsm" onclick="exportBulletinPDF('${b.id}')">📄 PDF</button>
                <button class="btn bsm bgn" onclick="exportBulletinExcel('${b.id}')">📊 XLS</button>
              </div>
            </td>
          </tr>`;}).join('')}
        </tbody>
        <tfoot>
          <tr class="tot">
            <td colspan="5">Totaux</td>
            <td style="text-align:right;color:var(--bl)">${chf(totalTransport)}</td>
            <td style="text-align:right;color:var(--pu)">${chf(totalTaxe)}</td>
            <td style="text-align:right;color:var(--tl)">${chf(totalTransport+totalTaxe+totalRegie)}</td>
            <td></td>
          </tr>
        </tfoot>
      </table></div>`}
    </div>
  `);
}
function bindCStats(){
  document.getElementById('stat-ch')?.addEventListener('change',e=>{
    go('c_stats',{cId:e.target.value,per:S.params.per||'all'});
  });
  document.getElementById('stat-df')?.addEventListener('change',e=>{
    go('c_stats',{cId:S.params.cId||'all',per:'custom',df:e.target.value,dt:S.params.dt||''});
  });
  document.getElementById('stat-dt')?.addEventListener('change',e=>{
    go('c_stats',{cId:S.params.cId||'all',per:'custom',df:S.params.df||'',dt:e.target.value});
  });
}


// ── C FACTURATION ────────────────────────────────────────────
function pgCFact(){
  const itab  = S.params.itab||'complet';
  const selTr = S.params.trId||D.transporteurs[0]?.id;
  const selCh = S.params.cId||D.chantiers[0]?.id;
  const tr    = D.transporteurs.find(t=>t.id===selTr);
  const ch    = D.chantiers.find(c=>c.id===selCh);

  const itabs=['complet','transport','synthese'].map(t=>`<button class="itab${itab===t?' on':''}" data-go="c_fact:itab=${t}:trId=${selTr}:cId=${selCh}">${{complet:'Vue complète (transport + taxe)',transport:'Facture transporteur',synthese:'Synthèse tous transporteurs'}[t]}</button>`).join('');

  const selectors=`
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <select class="fi" style="width:auto" id="fact-tr">
        ${D.transporteurs.map(t=>`<option value="${t.id}" ${t.id===selTr?'selected':''}>${t.nom}</option>`).join('')}
      </select>
      <select class="fi" style="width:auto" id="fact-ch">
        ${D.chantiers.filter(c=>c.actif).map(c=>`<option value="${c.id}" ${c.id===selCh?'selected':''}>${c.code} — ${c.nom}</option>`).join('')}
      </select>
      ${itab!=='synthese'?`
        <button class="btn bp" onclick="exportFacturationPDF('${selTr}','${selCh}')">↓ PDF Facture</button>
        <button class="btn bgn" onclick="exportFacturationExcel('${selTr}','${selCh}')">↓ Excel</button>
      `:''}
    </div>`;

  let content='';

  // ── TAB 1 : VUE COMPLÈTE transport + taxe ────────────────────────────────────
  if(itab==='complet'){
    if(!tr||!ch){content=`<div class="al al-a">Sélectionnez un transporteur et un chantier.</div>`;
    } else {
      const buls = D.bulletins.filter(b=>b.tId===selTr&&b.cId===selCh);
      const grille = TAXES_GRILLE[selCh]||{};

      // Global totals
      let gtTransport=0, gtTaxe=0;
      buls.forEach(b=>{
        const cc=coutBulletinComplet(b.id,tr,selCh);
        gtTransport+=cc.transport; gtTaxe+=cc.taxe;
      });
      const gtTotal=gtTransport+gtTaxe;
      const tva=gtTransport*0.081;

      // Vérif tarifs manquants
      const allLignes=D.lignes.filter(l=>buls.map(b=>b.id).includes(l.bId)&&l.type==='deblais');
      const lieuxSansTaxe=[...new Set(allLignes.map(l=>l.lieu).filter(lieu=>lieu&&!grille[lieu]))];

      content=`
        ${lieuxSansTaxe.length?`<div class="al al-a">⚠️ <strong>${lieuxSansTaxe.length} lieu(x) sans taxe de décharge configurée</strong> : ${lieuxSansTaxe.join(', ')} — le coût total sera incomplet. <a href="#" onclick="go('c_taxes',{cId:'${selCh}'})" style="font-weight:700;color:inherit">→ Configurer les taxes</a></div>`:''}

        <!-- KPIs -->
        <div class="g4" style="margin-bottom:16px">
          <div class="kpi">
            <div class="kpi-label">Transport HT</div>
            <div class="kpi-value" style="color:var(--bl)">${Math.round(gtTransport).toLocaleString('fr-CH')} CHF</div>
            <div class="kpi-sub">payé au transporteur</div>
            <div class="kpi-bar" style="width:${(gtTransport/(gtTotal||1)*100).toFixed(0)}%;background:var(--bl)"></div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Taxes décharge HT</div>
            <div class="kpi-value" style="color:var(--pu)">${Math.round(gtTaxe).toLocaleString('fr-CH')} CHF</div>
            <div class="kpi-sub">payé aux décharges</div>
            <div class="kpi-bar" style="width:${(gtTaxe/(gtTotal||1)*100).toFixed(0)}%;background:var(--pu)"></div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Coût total HT</div>
            <div class="kpi-value" style="color:var(--tl)">${Math.round(gtTotal).toLocaleString('fr-CH')} CHF</div>
            <div class="kpi-sub">transport + taxes</div>
            <div class="kpi-bar" style="width:100%;background:var(--tl)"></div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Bulletins</div>
            <div class="kpi-value">${buls.length}</div>
            <div class="kpi-sub">${D.lignes.filter(l=>buls.map(b=>b.id).includes(l.bId)).length} rotations</div>
          </div>
        </div>

        <!-- Tableau par bulletin -->
        <div class="card">
          <div class="ch">
            <span class="ct">Coûts complets — bulletin par bulletin</span>
            <span style="font-size:11px;color:var(--mu)">Transport + taxe de décharge</span>
          </div>
          <div style="overflow-x:auto"><table class="tbl">
            <thead><tr>
              <th>Bulletin</th><th>Date</th>
              <th style="color:var(--rd)">Déblais (lieux)</th>
              <th style="text-align:right;color:var(--bl)">Transport HT</th>
              <th style="text-align:right;color:var(--pu)">Taxe décharge HT</th>
              <th style="text-align:right;color:var(--tld)">Total HT</th>
            </tr></thead>
            <tbody>
              ${buls.map(bul=>{
                const cc=coutBulletinComplet(bul.id,tr,selCh);
                const debLieux=[...new Set(cc.ls.filter(l=>l.type==='deblais').map(l=>l.lieu))].join(', ')||'—';
                return`<tr>
                  <td style="font-weight:700;font-size:11px;font-family:monospace">${bul.num}</td>
                  <td style="color:var(--mu)">${bul.date}</td>
                  <td style="font-size:11px">${debLieux}</td>
                  <td style="text-align:right;font-weight:700;color:var(--bl)">${chf(cc.transport)}</td>
                  <td style="text-align:right;font-weight:700;color:${cc.taxe>0?'var(--pu)':'var(--tr)'}">${cc.taxe>0?chf(cc.taxe):'—'}</td>
                  <td style="text-align:right;font-weight:800;color:var(--tld)">${chf(cc.total)}</td>
                </tr>`;
              }).join('')}
            </tbody>
            <tfoot>
              <tr class="sub">
                <td colspan="3" style="text-align:right">Totaux</td>
                <td style="text-align:right;color:var(--bl);font-weight:800">${chf(gtTransport)}</td>
                <td style="text-align:right;color:var(--pu);font-weight:800">${chf(gtTaxe)}</td>
                <td style="text-align:right;color:var(--tld);font-weight:800">${chf(gtTotal)}</td>
              </tr>
            </tfoot>
          </table></div>
        </div>

        <!-- Tableau par lieu de décharge -->
        <div class="card">
          <div class="ch"><span class="ct">Détail par lieu de décharge</span></div>
          <div style="overflow-x:auto"><table class="tbl">
            <thead><tr>
              <th>Lieu de décharge</th><th>Classification</th><th>Quantité totale</th>
              <th style="text-align:right;color:var(--bl)">Tarif transport</th>
              <th style="text-align:right;color:var(--bl)">Transport HT</th>
              <th style="text-align:right;color:var(--pu)">Taxe / unité</th>
              <th style="text-align:right;color:var(--pu)">Taxe HT</th>
              <th style="text-align:right;color:var(--tld)">Total HT</th>
            </tr></thead>
            <tbody>
              ${(()=>{
                const byLieu={};
                D.lignes.filter(l=>buls.map(b=>b.id).includes(l.bId)&&l.type==='deblais'&&l.lieu).forEach(l=>{
                  if(!byLieu[l.lieu])byLieu[l.lieu]={lieu:l.lieu,t:0,v:0,transport:0,taxe:0,tarifTr:0,unitTr:'',tarifTx:0,unitTx:''};
                  const cc=calcCoutComplet(l,tr,selCh);
                  byLieu[l.lieu].t+=(cc.qte&&cc.unitTransport==='t'?cc.qte:(l.t||l.voyages*(cc.cap||16)*0.75))||0;
                  byLieu[l.lieu].v+=(cc.qte&&cc.unitTransport==='m³'?cc.qte:(l.v||l.voyages*(cc.cap||16)))||0;
                  byLieu[l.lieu].transport+=cc.transport;
                  byLieu[l.lieu].taxe+=cc.taxe;
                  byLieu[l.lieu].tarifTr=cc.tarifTransport;
                  byLieu[l.lieu].unitTr=cc.unitTransport;
                  byLieu[l.lieu].tarifTx=cc.tarifTaxe;
                  byLieu[l.lieu].unitTx=cc.unitTaxe;
                });
                return Object.values(byLieu).sort((a,b)=>b.transport-a.transport).map(g=>{
                  const lieuInfo=LIEUX_DECHARGE.find(x=>x.nom===g.lieu);
                  const typeBadge=lieuInfo?.type==='A'?`<span class="bk bkg" style="font-size:10px">Type A</span>`:lieuInfo?.type==='B'?`<span class="bk bka" style="font-size:10px">Type B</span>`:`<span class="bk bkx" style="font-size:10px">Autre</span>`;
                  const qteStr=g.unitTr==='m³'?`${num(g.v,0)} m³`:`${num(g.t,1)} t`;
                  return`<tr>
                    <td style="font-weight:700">${g.lieu}</td>
                    <td>${typeBadge}</td>
                    <td>${qteStr}</td>

// ── TAXES DE DÉCHARGE ─────────────────────────────────────────
// TAXES_GRILLE[cId][nomLieu] = {unit:'t'|'m3', tarif:number, note:''}
// Ces tarifs sont définis par le conducteur avant le chantier.
// Ils s'appliquent automatiquement à chaque rotation de déblais saisie par le transporteur.
// ☁️  Migration Supabase : table `taxes_grille`
let TAXES_GRILLE = {
  'c1':{
    'CRIDEC Ayent':{unit:'m3',tarif:4.50,note:'Contrat 2026 – matériaux inertes'},
    'Décharge Vétroz':{unit:'m3',tarif:3.80,note:'Béton recyclé uniquement'},
    'Décharge Conthey':{unit:'t',tarif:5.20,note:''},
  },
  'c2':{
    'CRIDEC Ayent':{unit:'m3',tarif:4.50,note:'Identique chantier A22'},
  },
  'c3':{
    'Décharge Fully':{unit:'t',tarif:6.80,note:'Pesée obligatoire – béton armé CHF 9.50/t'},
  },
};

// Calcule les taxes générées par les bulletins d'un chantier
// Retourne un tableau de lignes {lieu, bul, date, transporteur, qte, unit, tarif, mnt, lignes[]}
function calcTaxesBulletins(cId){
  if(!TAXES_GRILLE[cId]) return [];
  const grille = TAXES_GRILLE[cId];
  const buls = D.bulletins.filter(b=>b.cId===cId);
  const result = [];
  buls.forEach(bul=>{
    const tr = D.transporteurs.find(t=>t.id===bul.tId);
    const cap = tr?.capBenne||16;
    const debLignes = D.lignes.filter(l=>l.bId===bul.id&&l.type==='deblais'&&l.lieu);
    // Grouper par lieu dans ce bulletin
    const byLieu={};
    debLignes.forEach(l=>{
      if(!byLieu[l.lieu]) byLieu[l.lieu]=[];
      byLieu[l.lieu].push(l);
    });
    Object.entries(byLieu).forEach(([lieu, lgs])=>{
      const tx = grille[lieu];
      // Volume/tonnage total pour ce lieu dans ce bulletin
      let totalT=0, totalV=0;
      lgs.forEach(l=>{
        if(l.voyages>0){totalV+=(l.voyages*cap)||0; totalT+=(l.voyages*cap*0.75)||0;}
        else{totalT+=(l.t||0); totalV+=(l.v||(l.t||0)*0.75)||0;}
      });
      const qte  = tx?.unit==='m3' ? totalV : totalT;
      const mnt  = tx ? qte * tx.tarif : 0;
      result.push({
        lieu, bul, tr,
        date: bul.date,
        transporteur: tr?.nom||'?',
        totalT, totalV,
        unit: tx?.unit||'t',
        tarif: tx?.tarif||0,
        mnt,
        hasTarif: !!tx,
        lgs,
      });
    });
  });
  return result;
}

  // Auto-add all lieux not yet in grille (at tarif 0 — to be filled)
  LIEUX_DECHARGE.forEach(l=>{
    if(!TAXES_GRILLE[selCh][l.nom])
      TAXES_GRILLE[selCh][l.nom]={unit:'t', tarif:0, note:''};

  const grille = TAXES_GRILLE[selCh];

function bindCTaxes(){
  const selCh = S.params.cId || D.chantiers[0]?.id || '';
  if(!TAXES_GRILLE[selCh]) TAXES_GRILLE[selCh]={};
  const grille = TAXES_GRILLE[selCh];

  document.getElementById('taxes-ch-sel')?.addEventListener('change',e=>{
    S.params.cId=e.target.value; render();
  });

  document.getElementById('add-taxe-lieu')?.addEventListener('click',()=>{
    const deja=Object.keys(grille);
    const dispo=LIEUX_DECHARGE.filter(l=>!deja.includes(l.nom));
    if(!dispo.length){toast('Tous les lieux sont déjà dans la grille','a');return;}
    const nom=prompt(
      'Saisissez le nom du lieu (copiez exactement) :\n\n' +
      dispo.map((l,i)=>`${i+1}. ${l.nom}`).join('\n')+'\n\nNom :'
    );
    if(!nom||!LIEUX_DECHARGE.find(l=>l.nom===nom)){
      if(nom) toast('Nom non reconnu','r'); return;
    }
    grille[nom]={unit:'t',tarif:0,note:''};
    addAudit(`Taxe ajoutée — ${nom} — ${cName(selCh)}`,'info');
    toast(`${nom} ajouté ✓`); render();
  });

  document.querySelectorAll('.add-tarif-lieu').forEach(btn=>btn.addEventListener('click',()=>{
    grille[btn.dataset.lieu]={unit:'t',tarif:0,note:''};
    render();
  }));

  document.querySelectorAll('[data-field][data-lieu]').forEach(el=>{
    el.addEventListener('change',()=>{
      const lieu=el.dataset.lieu, field=el.dataset.field;
      if(!grille[lieu]) return;
      if(field==='tarif') grille[lieu].tarif=parseFloat(el.value)||0;
      else grille[lieu][field]=el.value;
      addAudit(`Taxe MàJ — ${lieu} : ${grille[lieu].tarif} CHF/${grille[lieu].unit} — ${cName(selCh)}`,'info');
      toast('Enregistré ✓'); render();
    });
  });

  document.querySelectorAll('.del-tarif-lieu').forEach(btn=>btn.addEventListener('click',()=>{
    if(!confirm(`Supprimer le tarif pour "${btn.dataset.lieu}" ?`)) return;
    delete grille[btn.dataset.lieu];
    addAudit(`Taxe supprimée — ${btn.dataset.lieu} — ${cName(selCh)}`,'warn');
    toast('Supprimé'); render();
  }));

  document.getElementById('copy-grille')?.addEventListener('click',()=>{
    const cible=document.getElementById('copy-to-ch')?.value;
    if(!cible) return;
    if(!TAXES_GRILLE[cible]) TAXES_GRILLE[cible]={};
    let count=0;
    Object.entries(grille).forEach(([lieu,tx])=>{
      if(!TAXES_GRILLE[cible][lieu]){
        TAXES_GRILLE[cible][lieu]={...tx,note:(tx.note?tx.note+' · ':'')+'Copié depuis '+cName(selCh)};
        count++;
      }
    });
    addAudit(`${count} tarif(s) copiés vers ${cName(cible)}`,'info');
    toast(`${count} tarif(s) copiés vers ${D.chantiers.find(c=>c.id===cible)?.code} ✓`);
  });
}


// ── HELPERS SUIVI CHANTIER ────────────────────────────────────────────────────
function rStatus(r){ const s=RAPPORT_STATUS[r.status]||RAPPORT_STATUS.draft; return`<span class="bk" style="background:${s.b};color:${s.c};font-size:10px">${s.lbl}</span>`; }
function empName(id){ return PERSONNEL_DB.find(e=>e.id===id)?.name||id; }
function macName(id){ return MACHINES_DB.find(m=>m.id===id)?.name||id; }
function matChName(id){ return MATS_CH_DB.find(m=>m.id===id)?.name||id; }
function sseName(id){ return SSE_DB.find(s=>s.id===id)?.name||id; }
function rCostMO(r){ return (r.personnel||[]).reduce((s,p)=>{ const e=PERSONNEL_DB.find(x=>x.id===p.pid); return s+(((p.nh||0)+(p.rh||0))*(e?.rate||0)); },0); }
function rCostMachines(r){ return (r.machines||[]).reduce((s,m)=>{ const db=MACHINES_DB.find(x=>x.id===m.mid); return s+(m.hours||0)*(db?.rh||0)+(m.days||0)*(db?.rd||0); },0); }
function rCostMats(r){ return (r.materials||[]).reduce((s,m)=>s+(m.qty||0)*(m.price||0),0); }
function rCostSSE(r){ return (r.sse||[]).reduce((s,s2)=>s+(s2.qty||0)*(s2.price||0),0); }
function rCostTransp(r){ return (r.transports||[]).reduce((s,t)=>s+(t.qty||0)*(t.pu||0),0); }
function rCostTotal(r){ return rCostMO(r)+rCostMachines(r)+rCostMats(r)+rCostSSE(r)+rCostTransp(r); }
function rapportsByCh(cId){ return D.rapports.filter(r=>r.cId===cId); }
function weekLabel(w){ return `Semaine ${w}`; }
function meteoIcon(cond){ return {Soleil:'☀️',Nuageux:'⛅',Pluie:'🌧️',Vent:'🌬️',Orage:'⛈️',Brouillard:'🌫️',Neige:'❄️'}[cond]||'🌤️'; }

// Validation rapide d'un rapport depuis le dashboard
function validateRapport(rId){
  const r=D.rapports.find(x=>x.id===rId);
  if(!r)return;
  if(!confirm('Valider le rapport du '+r.date+' ?'))return;
  r.status='validated';
  addAudit('Rapport '+r.date+' validé depuis le dashboard','info');
  toast('Rapport validé ✓','g');
  // Supabase sync
  if(SB){
    SB.from('rapports').update({status:'validated'}).eq('id',rId).then(()=>{});
  }
  render();
}

function bindCRapport(){
  const re=S.rapEdit;
  if(!re) return;

  // Sync date from input
  document.getElementById('re-date')?.addEventListener('change',e=>{ re.date=e.target.value; re.week=getWeek(e.target.value); });
  document.getElementById('re-obs')?.addEventListener('input',e=>re.obs=e.target.value);
  document.getElementById('re-tmin')?.addEventListener('change',e=>re.weather={...re.weather,tmin:parseInt(e.target.value)||0});
  document.getElementById('re-tmax')?.addEventListener('change',e=>re.weather={...re.weather,tmax:parseInt(e.target.value)||0});
  document.getElementById('re-comment')?.addEventListener('input',e=>re.comment=e.target.value);

  document.getElementById('save-rap')?.addEventListener('click',async()=>{
    const existing=D.rapports.findIndex(x=>x.id===re.id);
    if(existing>=0) D.rapports[existing]={...re};
    else D.rapports.push({...re});
    // Supabase sync
    if(SB){
      const{error}=await SB.from('rapports').upsert({
        id:re.id, c_id:re.cId, date:re.date, week:re.week,
        weather:re.weather, tasks:re.tasks, personnel:re.personnel,
        machines:re.machines, materials:re.materials, sse:re.sse,
        transports:re.transports, obs:re.obs, status:re.status,
        owner_id:S.user?.id
      });
      if(error) toast('Erreur sync : '+error.message,'r');
    }
    persistSave();
    addAudit(`Rapport ${re.date} — ${cName(re.cId)} enregistré`,'info');
    toast('Rapport enregistré ✓');
    S.rapEdit=null;
    go(S.user?.role==='contremaitre'?'cm_home':'c_rapports',{cId:re.cId});
  });

  document.getElementById('submit-rap')?.addEventListener('click',async()=>{
    re.status='submitted'; re.submitted=td();
    const ex=D.rapports.findIndex(x=>x.id===re.id);
    if(ex>=0) D.rapports[ex]={...re}; else D.rapports.push({...re});
    if(SB){
      await SB.from('rapports').upsert({
        id:re.id, c_id:re.cId, date:re.date, week:re.week,
        weather:re.weather, tasks:re.tasks, personnel:re.personnel,
        machines:re.machines, materials:re.materials, sse:re.sse,
        transports:re.transports, obs:re.obs, status:'submitted',
        submitted_at:new Date().toISOString(), owner_id:S.user?.id
      });
    }
    persistSave();
    addAudit(`Rapport ${re.date} soumis pour validation`,'info');
    toast('Rapport soumis ✓ — Le conducteur recevra une notification.');
    S.rapEdit=null;
    go(S.user?.role==='contremaitre'?'cm_home':'c_rapports',{cId:re.cId});
  });

  document.getElementById('validate-rap')?.addEventListener('click',()=>{
    re.status='validated'; re.comment=document.getElementById('re-comment')?.value||re.comment||'';
    const ex=D.rapports.findIndex(x=>x.id===re.id);
    if(ex>=0) D.rapports[ex]={...re};
    addAudit(`Rapport ${re.date} validé`,'success'); toast('Rapport validé ✓');
    S.rapEdit=null; go('c_rapports',{cId:re.cId});
  });

  document.getElementById('reject-rap')?.addEventListener('click',()=>{
    re.status='rejected'; re.comment=document.getElementById('re-comment')?.value||re.comment||'À corriger';
    const ex=D.rapports.findIndex(x=>x.id===re.id);
    if(ex>=0) D.rapports[ex]={...re};
    addAudit(`Rapport ${re.date} renvoyé pour correction`,'warn'); toast('Rapport renvoyé','a');
    S.rapEdit=null; go('c_rapports',{cId:re.cId});
  });

  document.getElementById('del-rap')?.addEventListener('click',()=>{
    if(!confirm('Supprimer définitivement ce rapport ?')) return;
    const i=D.rapports.findIndex(x=>x.id===re.id);
    if(i>=0) D.rapports.splice(i,1);
    addAudit(`Rapport ${re.date} supprimé`,'warn'); toast('Rapport supprimé');
    S.rapEdit=null; go('c_rapports',{cId:re.cId});
  });

  // SUVA save
  document.getElementById('save-suva')?.addEventListener('click',()=>{
    const type=document.getElementById('suva-type')?.value;
    if(!type){toast("Sélectionnez le type d'événement",'r');return;}
    re.suva_accident={
      type, datetime:document.getElementById('suva-dt')?.value||'',
      lieu:document.getElementById('suva-lieu')?.value||'',
      desc:document.getElementById('suva-desc')?.value||'',
      blesse:document.getElementById('suva-blesse')?.value||'',
      soins:document.getElementById('suva-soins')?.value||'',
      temoins:document.getElementById('suva-temoins')?.value||'',
      mesures:document.getElementById('suva-mesures')?.value||'',
      savedAt:new Date().toLocaleString('fr-CH'),
    };
    const ex=D.rapports.findIndex(x=>x.id===re.id);
    if(ex>=0)D.rapports[ex]={...re};else D.rapports.push({...re});
    addAudit(`⚠️ INCIDENT SUVA déclaré — ${type} — ${re.date} — ${cName(re.cId)}`,'warn');
    toast('Incident enregistré et transmis au conducteur ✓','a');
    render();
  });
}

// ── PAGE : RÉCAPITULATIF FINANCIER COMPLET ────────────────────────────────────
function pgCRecapFin(){
  const selCh=S.params.cId||D.chantiers[0]?.id;
  const ch=D.chantiers.find(c=>c.id===selCh);
  const raps=D.rapports.filter(r=>r.cId===selCh&&r.status!=='draft');
  const fg=0.15; // frais généraux 15%

  // Totaux cumulés
  const totMO=raps.reduce((s,r)=>s+rCostMO(r),0);
  const totMac=raps.reduce((s,r)=>s+rCostMachines(r),0);
  const totMat=raps.reduce((s,r)=>s+rCostMats(r),0);
  const totSSE=raps.reduce((s,r)=>s+rCostSSE(r),0);
  const totTranspRap=raps.reduce((s,r)=>s+rCostTransp(r),0);

  // Transports BulletinsPro pour ce chantier
  const buls=D.bulletins.filter(b=>b.cId===selCh);
  let totTransportBP=0,totTaxesBP=0;
  buls.forEach(b=>{
    const tr=D.transporteurs.find(t=>t.id===b.tId);
    const cc=coutBulletinComplet(b.id,tr,selCh);
    totTransportBP+=cc.transport; totTaxesBP+=cc.taxe;
  });

  const totHT=totMO+totMac+totMat+totSSE+totTransportBP+totTaxesBP;
  const totFG=totHT*fg;
  const totTTC=totHT*1.081;

  // Par semaine
  const bySem={};
  raps.forEach(r=>{
    const k=`S${r.week}`;
    if(!bySem[k])bySem[k]={week:r.week,mo:0,mac:0,mat:0,transp:0,n:0};
    bySem[k].mo+=rCostMO(r);bySem[k].mac+=rCostMachines(r);
    bySem[k].mat+=rCostMats(r)+rCostSSE(r);bySem[k].n++;
  });
  const semaines=Object.values(bySem).sort((a,b)=>a.week-b.week);
  const maxSem=Math.max(...semaines.map(s=>s.mo+s.mac+s.mat),1);

  return cLayout(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:15px;font-weight:800">Récapitulatif financier</div>
        <div style="font-size:12px;color:var(--mu)">Coûts cumulés toutes catégories</div>
      </div>
      <div style="display:flex;gap:8px">
        <select class="fi" style="width:auto" id="recap-ch">
          ${D.chantiers.filter(c=>c.actif).map(c=>`<option value="${c.id}" ${c.id===selCh?'selected':''}>${c.code} — ${c.nom}</option>`).join('')}
        </select>
        <button class="btn bp" onclick="exportRecapPDF('${selCh}')">📄 PDF</button>
        <button class="btn bgn" onclick="exportRecapExcel('${selCh}')">📊 Excel</button>
      </div>
    </div>

    <!-- KPIs principaux -->
    <div class="g4" style="margin-bottom:14px">
      <div class="kpi"><div class="kpi-label">Main d'œuvre</div><div class="kpi-value" style="color:var(--bl);font-size:18px">${chf(totMO)}</div><div class="kpi-sub">${raps.reduce((s,r)=>s+(r.personnel||[]).reduce((s2,p)=>s2+(p.nh||0)+(p.rh||0),0),0).toFixed(0)} h totales</div><div class="kpi-bar" style="width:${pct(totMO,totHT||1)}%;background:var(--bl)"></div></div>
      <div class="kpi"><div class="kpi-label">Machines / engins</div><div class="kpi-value" style="color:var(--pu);font-size:18px">${chf(totMac)}</div><div class="kpi-sub">${raps.reduce((s,r)=>s+(r.machines||[]).reduce((s2,m)=>s2+(m.hours||0),0),0).toFixed(0)} h machine</div><div class="kpi-bar" style="width:${pct(totMac,totHT||1)}%;background:var(--pu)"></div></div>
      <div class="kpi"><div class="kpi-label">Matériaux + SSE</div><div class="kpi-value" style="color:var(--gn);font-size:18px">${chf(totMat+totSSE)}</div><div class="kpi-sub">${raps.reduce((s,r)=>s+(r.materials||[]).length+(r.sse||[]).length,0)} lignes</div><div class="kpi-bar" style="width:${pct(totMat+totSSE,totHT||1)}%;background:var(--gn)"></div></div>
      <div class="kpi"><div class="kpi-label">Transport + Taxes</div><div class="kpi-value" style="color:var(--rd);font-size:18px">${chf(totTransportBP+totTaxesBP)}</div><div class="kpi-sub">${buls.length} bulletins transport</div><div class="kpi-bar" style="width:${pct(totTransportBP+totTaxesBP,totHT||1)}%;background:var(--rd)"></div></div>
    </div>

    <!-- Tableau de synthèse -->
    <div class="card" style="margin-bottom:12px">
      <div class="ch"><span class="ct">Synthèse des coûts HT</span></div>
      <table class="tbl">
        <tbody>
          <tr><td>👷 Main d'œuvre</td><td style="text-align:right;font-weight:700;color:var(--bl)">${chf(totMO)}</td><td style="text-align:right;color:var(--mu);font-size:11px">${(totHT?totMO/totHT*100:0).toFixed(1)}%</td></tr>
          <tr><td>🚜 Machines / engins</td><td style="text-align:right;font-weight:700;color:var(--pu)">${chf(totMac)}</td><td style="text-align:right;color:var(--mu);font-size:11px">${(totHT?totMac/totHT*100:0).toFixed(1)}%</td></tr>
          <tr><td>📦 Matériaux chantier</td><td style="text-align:right;font-weight:700;color:var(--gn)">${chf(totMat)}</td><td style="text-align:right;color:var(--mu);font-size:11px">${(totHT?totMat/totHT*100:0).toFixed(1)}%</td></tr>
          <tr><td>🦺 SSE / sécurité</td><td style="text-align:right;font-weight:700;color:var(--am)">${chf(totSSE)}</td><td style="text-align:right;color:var(--mu);font-size:11px">${(totHT?totSSE/totHT*100:0).toFixed(1)}%</td></tr>
          <tr><td>🚛 Transport (BulletinsPro)</td><td style="text-align:right;font-weight:700;color:var(--rd)">${chf(totTransportBP)}</td><td style="text-align:right;color:var(--mu);font-size:11px">${(totHT?totTransportBP/totHT*100:0).toFixed(1)}%</td></tr>
          <tr><td>🏭 Taxes de décharge</td><td style="text-align:right;font-weight:700;color:var(--pu)">${chf(totTaxesBP)}</td><td style="text-align:right;color:var(--mu);font-size:11px">${(totHT?totTaxesBP/totHT*100:0).toFixed(1)}%</td></tr>
        </tbody>
        <tfoot>
          <tr class="sub"><td>Sous-total HT</td><td style="text-align:right;font-weight:800">${chf(totHT)}</td><td></td></tr>
          <tr><td>Frais généraux (${(fg*100).toFixed(0)}%)</td><td style="text-align:right;color:var(--mu)">${chf(totFG)}</td><td></td></tr>
          <tr class="tot"><td>Total TTC (TVA 8.1%)</td><td style="text-align:right;color:var(--tl);font-size:17px">${chf(totTTC)}</td><td></td></tr>
        </tfoot>
      </table>
    </div>

    <!-- Évolution par semaine -->
    ${semaines.length>0?`<div class="card">
      <div class="ch"><span class="ct">Évolution par semaine</span></div>
      ${semaines.map(s=>{
        const tot=s.mo+s.mac+s.mat;
        return`<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
            <span style="font-weight:700">${weekLabel(s.week)}</span>
            <div style="display:flex;gap:10px">
              <span style="color:var(--bl)">MO ${chf(s.mo)}</span>
              <span style="color:var(--pu)">Mac ${chf(s.mac)}</span>
              <span style="color:var(--gn)">Mat ${chf(s.mat)}</span>
              <span style="font-weight:700">${chf(tot)}</span>
            </div>
          </div>
          <div class="prog">
            <div class="pf" style="width:${pct(s.mo,maxSem)}%;background:var(--bl);border-radius:0"></div>
          </div>
        </div>`;
      }).join('')}
    </div>`:''}
  `);
}

// ── EXPORT PDF RAPPORT ────────────────────────────────────────────────────────
function exportRapportPDF(rId){
  if(!window.jspdf){toast('Chargement PDF...','g');setTimeout(()=>exportRapportPDF(rId),800);return;}
  const{jsPDF}=window.jspdf;
  const r=D.rapports.find(x=>x.id===rId);
  if(!r){toast('Rapport introuvable','r');return;}
  const ch=D.chantiers.find(c=>c.id===r.cId);
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,M=14;let y=14;
  // Header
  doc.setFillColor(13,148,136);doc.rect(0,0,W,22,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(13);
  doc.text('RAPPORT JOURNALIER',M,8);
  doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text(`${ch?.code} — ${ch?.nom} · ${r.date} · ${weekLabel(r.week)} · ${r.weather?.cond||''} ${r.weather?.tmin||0}°/${r.weather?.tmax||0}°`,M,14);
  const st=RAPPORT_STATUS[r.status]||RAPPORT_STATUS.draft;
  doc.setFontSize(8);doc.text(st.lbl,W-M,14,'right');
  y=28;
  // Tasks
  if((r.tasks||[]).length){
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(15,23,42);
    doc.text('TÂCHES EFFECTUÉES',M,y);y+=5;
    r.tasks.forEach(t=>{
      doc.setFont('helvetica',t.regie?'bolditalic':'normal');doc.setFontSize(8);doc.setTextColor(t.regie?180:15,t.regie?80:23,t.regie?0:42);
      doc.text(`${t.regie?'[RÉGIE] ':''}${t.l}`,M+2,y);y+=5;
    });y+=2;
  }
  // Personnel
  const totH=(r.personnel||[]).reduce((s,p)=>s+(p.nh||0)+(p.rh||0),0);
  doc.setFillColor(235,248,255);doc.rect(M,y,W-2*M,6,'F');
  doc.setTextColor(37,99,235);doc.setFont('helvetica','bold');doc.setFontSize(8);
  doc.text(`MAIN D'ŒUVRE — ${num(totH,1)} h — ${f2(rCostMO(r))} CHF`,M+2,y+4);y+=6;
  (r.personnel||[]).forEach(p=>{const e=PERSONNEL_DB.find(x=>x.id===p.pid);
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(15,23,42);
    doc.text(`${e?.name||'?'}  ${num(p.nh,1)}h + ${num(p.rh,1)}h régie`,M+2,y+3);y+=5;});
  y+=3;
  // Machines
  const totMach=rCostMachines(r);
  doc.setFillColor(245,243,255);doc.rect(M,y,W-2*M,6,'F');
  doc.setTextColor(124,58,237);doc.setFont('helvetica','bold');doc.setFontSize(8);
  doc.text(`MACHINES — ${f2(totMach)} CHF`,M+2,y+4);y+=6;
  (r.machines||[]).forEach(m=>{const mac=MACHINES_DB.find(x=>x.id===m.mid);
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(15,23,42);
    doc.text(`${mac?.name||'?'}  ${num(m.hours,1)}h  ${m.obs?'— '+m.obs:''}`,M+2,y+3);y+=5;});
  y+=3;
  // Matériaux
  if((r.materials||[]).length+(r.sse||[]).length>0){
    doc.setFillColor(240,253,244);doc.rect(M,y,W-2*M,6,'F');
    doc.setTextColor(22,163,74);doc.setFont('helvetica','bold');doc.setFontSize(8);
    doc.text(`MATÉRIAUX — ${f2(rCostMats(r)+rCostSSE(r))} CHF`,M+2,y+4);y+=6;
    (r.materials||[]).forEach(m=>{const mat=MATS_CH_DB.find(x=>x.id===m.matid);
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(15,23,42);
      doc.text(`${mat?.name||'?'}  ${num(m.qty,1)} ${m.unit||''}  × ${num(m.price,2)} CHF`,M+2,y+3);y+=5;});
    y+=2;
  }
  // Transports
  if((r.transports||[]).length){
    doc.setFillColor(255,241,242);doc.rect(M,y,W-2*M,6,'F');
    doc.setTextColor(220,38,38);doc.setFont('helvetica','bold');doc.setFontSize(8);
    doc.text(`TRANSPORTS — ${f2(rCostTransp(r))} CHF`,M+2,y+4);y+=6;
    r.transports.forEach(t=>{
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(15,23,42);
      doc.text(`${t.desc}  →  ${t.lieu}  ${t.qty} ${t.unit}  × ${num(t.pu,2)} CHF`,M+2,y+3);y+=5;});
    y+=2;
  }
  // Obs
  if(r.obs){doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(100,116,139);
    doc.text('Observations: '+r.obs.substring(0,120),M,y);y+=6;}
  // Totaux
  y+=3;
  doc.setFillColor(13,148,136);doc.rect(W/2,y,W/2-M,8,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(10);
  doc.text('TOTAL JOURNÉE HT',W/2+2,y+5.5);doc.text(`${f2(rCostTotal(r))} CHF`,W-M-2,y+5.5,'right');
  doc.save(`Rapport_${r.date}_${ch?.code||''}.pdf`);
  addAudit(`PDF rapport ${r.date} exporté`,'info');toast('PDF rapport téléchargé ✓');
}

function exportRapportExcel(rId){

  const r=D.rapports.find(x=>x.id===rId);if(!r)return;
  const ch=D.chantiers.find(c=>c.id===r.cId);
  const wb=XLSX.utils.book_new();
  const rows=[['RAPPORT JOURNALIER — '+r.date],['Chantier',ch?.nom,'Semaine',r.week,'Météo',r.weather?.cond],[''],
    ['MAIN D\'ŒUVRE'],['Collaborateur','Catégorie','H. normales','H. régie','Taux CHF/h','Coût HT']];
  (r.personnel||[]).forEach(p=>{const e=PERSONNEL_DB.find(x=>x.id===p.pid);
    rows.push([e?.name||'?',e?.cat||'',p.nh||0,p.rh||0,e?.rate||0,((p.nh||0)+(p.rh||0))*(e?.rate||0)]);});
  rows.push(['','','','','Total MO',rCostMO(r)]);
  rows.push([''],['MACHINES'],['Machine','Catégorie','Heures','Jours','CHF/h','Coût HT']);
  (r.machines||[]).forEach(m=>{const mac=MACHINES_DB.find(x=>x.id===m.mid);
    rows.push([mac?.name||'?',mac?.cat||'',m.hours||0,m.days||0,mac?.rh||0,(m.hours||0)*(mac?.rh||0)+(m.days||0)*(mac?.rd||0)]);});
  rows.push(['','','','','Total machines',rCostMachines(r)]);
  rows.push([''],['MATÉRIAUX'],['Matériau','Unité','Quantité','Prix CHF','Total HT']);
  (r.materials||[]).forEach(m=>{const mat=MATS_CH_DB.find(x=>x.id===m.matid);
    rows.push([mat?.name||'?',m.unit||'',m.qty||0,m.price||0,(m.qty||0)*(m.price||0)]);});
  rows.push(['','','','Total matériaux',rCostMats(r)]);
  rows.push([''],['TRANSPORTS / ÉVACUATIONS'],['Description','Lieu','Quantité','Unité','Prix CHF','Total HT']);
  (r.transports||[]).forEach(t=>rows.push([t.desc,t.lieu,t.qty||0,t.unit,t.pu||0,(t.qty||0)*(t.pu||0)]));
  rows.push(['','','','','Total transports',rCostTransp(r)]);
  rows.push([''],['TOTAL JOURNÉE HT',rCostTotal(r)]);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:28},{wch:14},{wch:10},{wch:10},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws,'Rapport');
  XLSX.writeFile(wb,`Rapport_${r.date}_${ch?.code||''}.xlsx`);
  toast('Excel rapport téléchargé ✓');
}

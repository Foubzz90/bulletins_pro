  y=30;
  const lines=[
    ["Main d'œuvre",totMO,'var(--bl)'],['Machines',totMac,''],['Matériaux chantier',totMat,''],
    ['SSE / sécurité',totSSE,''],['Transport BulletinsPro',totTr,''],['Taxes de décharge',totTx,'']
  ];
  doc.setFillColor(247,250,252);doc.rect(M,y,W-2*M,6,'F');
  doc.setTextColor(100,116,139);doc.setFont('helvetica','bold');doc.setFontSize(8);
  doc.text('CATÉGORIE',M+2,y+4);doc.text('MONTANT HT',W-M-2,y+4,'right');doc.text('%',W-M-24,y+4,'right');y+=6;
  lines.forEach(([lbl,val],i)=>{
    if(i%2===0){doc.setFillColor(252,253,254);doc.rect(M,y,W-2*M,5,'F');}
    doc.setTextColor(15,23,42);doc.setFont('helvetica','normal');doc.setFontSize(8);
    doc.text(lbl,M+2,y+3.5);doc.setFont('helvetica','bold');
    doc.text(`${f2(val)} CHF`,W-M-2,y+3.5,'right');
    doc.setFont('helvetica','normal');doc.setTextColor(100,116,139);
    doc.text(`${totHT?num(val/totHT*100,1):0}%`,W-M-24,y+3.5,'right');y+=5;
  });
  y+=2;
  doc.setFillColor(13,148,136);doc.rect(M,y,W-2*M,9,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(11);
  doc.text('TOTAL HT',M+2,y+6);doc.text(`${f2(totHT)} CHF`,W-M-2,y+6,'right');y+=15;
  doc.setTextColor(100,116,139);doc.setFontSize(8);
  doc.text(`Frais généraux 15% : ${f2(totHT*0.15)} CHF`,M,y);
  doc.text(`Total TTC (TVA 8.1%) : ${f2(totHT*1.081)} CHF`,W-M,y,'right');
  doc.save(`Recap_${ch?.code}_${new Date().toISOString().split('T')[0]}.pdf`);
  toast('PDF récap financier téléchargé ✓');
}

function exportRecapExcel(cId){
  if(!window.XLSX){toast('Chargement Excel...','g');setTimeout(()=>exportRecapExcel(cId),800);return;}
  const ch=D.chantiers.find(c=>c.id===cId);
  const raps=D.rapports.filter(r=>r.cId===cId&&r.status!=='draft');
  const buls=D.bulletins.filter(b=>b.cId===cId);
  let totTr=0,totTx=0;
  buls.forEach(b=>{const tr=D.transporteurs.find(t=>t.id===b.tId);const cc=coutBulletinComplet(b.id,tr,cId);totTr+=cc.transport;totTx+=cc.taxe;});
  const wb=XLSX.utils.book_new();
  // Sheet 1: Synthèse
  const rows=[['RÉCAPITULATIF FINANCIER — '+ch?.nom],['Date',new Date().toLocaleDateString('fr-CH')],[''],
    ['Catégorie','Montant HT','%'],
    ["Main d'œuvre",raps.reduce((s,r)=>s+rCostMO(r),0)],
    ['Machines',raps.reduce((s,r)=>s+rCostMachines(r),0)],
    ['Matériaux',raps.reduce((s,r)=>s+rCostMats(r),0)],
    ['SSE',raps.reduce((s,r)=>s+rCostSSE(r),0)],
    ['Transport BulletinsPro',totTr],['Taxes décharge',totTx],
  ];
  const totHT=rows.slice(4).reduce((s,r)=>s+(r[1]||0),0);
  rows.slice(4).forEach(r=>{if(r[1]!==undefined)r[2]=totHT?parseFloat((r[1]/totHT*100).toFixed(1)):0;});
  rows.push(['TOTAL HT',totHT,'100%'],['Frais généraux 15%',parseFloat((totHT*0.15).toFixed(2))],
    ['Total TTC',parseFloat((totHT*1.081).toFixed(2))]);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:26},{wch:16},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws,'Synthèse');
  // Sheet 2: Rapports journaliers
  const rapRows=[['Date','Semaine','Météo','Nb pers.','H. MO','Coût MO','Nb machines','Coût machines','Coût matériaux','Coût transports','Total journée']];
  raps.forEach(r=>rapRows.push([r.date,r.week,r.weather?.cond,
    (r.personnel||[]).length,(r.personnel||[]).reduce((s,p)=>s+(p.nh||0)+(p.rh||0),0),
    parseFloat(rCostMO(r).toFixed(2)),(r.machines||[]).length,parseFloat(rCostMachines(r).toFixed(2)),
    parseFloat((rCostMats(r)+rCostSSE(r)).toFixed(2)),parseFloat(rCostTransp(r).toFixed(2)),
    parseFloat(rCostTotal(r).toFixed(2))]));
  const ws2=XLSX.utils.aoa_to_sheet(rapRows);
  ws2['!cols']=[{wch:10},{wch:8},{wch:10},{wch:8},{wch:8},{wch:12},{wch:12},{wch:14},{wch:14},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,'Rapports journaliers');
  XLSX.writeFile(wb,`Recap_${ch?.code}_${new Date().toISOString().split('T')[0]}.xlsx`);
  toast('Excel récap téléchargé ✓');
}

// ── HELPER: get week number ───────────────────────────────────────────────────
function getWeek(dateStr){
  const d=new Date(dateStr);
  const jan1=new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
}

function bindCUsers(){
  // Toggle actif/inactif
  document.querySelectorAll('.toggle-user').forEach(btn=>btn.addEventListener('click',async()=>{
    const u=ACCOUNTS.find(a=>a.id===btn.dataset.id);
    if(!u)return;
    u.actif=u.actif===false?true:false;
    // En mode Supabase : mettre à jour le champ actif dans profiles
    if(SB){
      await SB.from('profiles').update({actif:u.actif}).eq('id',u.id);
    }
    addAudit(`Compte ${u.nom} ${u.actif?'réactivé':'désactivé'}`,'warn');
    toast(`${u.nom} ${u.actif?'réactivé ✓':'désactivé'}`,u.actif?'g':'a');
    render();
  }));

  // Inviter / créer
  document.getElementById('send-invite')?.addEventListener('click',async()=>{
    const nom   = document.getElementById('inv-nom')?.value.trim();
    const email = document.getElementById('inv-email')?.value.trim().toLowerCase();
    const poste = document.getElementById('inv-poste')?.value.trim();
    const role  = S.params.role||'chauffeur';
    const av    = (document.getElementById('inv-av')?.value.trim().toUpperCase()||
                   nom?.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2)||'??');
    const chIds = role==='conducteur'
      ? D.chantiers.map(c=>c.id)
      : [...(document.querySelectorAll('.ch-assign:checked')||[])].map(el=>el.dataset.cid);

    if(!nom)  {toast('Le nom est obligatoire','r');return;}
    if(!email){toast("L'email est obligatoire",'r');return;}
    if(ACCOUNTS.find(a=>a.email===email)){toast('Cet email est déjà utilisé','r');return;}

    const btn=document.getElementById('send-invite');
    if(btn){btn.disabled=true;btn.textContent='En cours...';}

    // ── MODE SUPABASE : invitation via Edge Function ─────────────────────
    if(SB){
      try{
        if(btn){btn.disabled=true; btn.textContent='Envoi en cours...';}

        // Appel à la Edge Function invite-user (nécessite JWT conducteur)
        const session = S.user?._sbSession || (await SB.auth.getSession()).data?.session;
        const res = await fetch(
          `${SUPABASE_URL}/functions/v1/invite-user`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${session?.access_token}`
            },
            body: JSON.stringify({nom, email, role, poste, av, chantier_ids:chIds})
          }
        );
        const result = await res.json();
        if(result.error){
          toast('Erreur : '+result.error,'r');
          if(btn){btn.disabled=false; btn.textContent="✉️ Envoyer l'invitation";}
          return;
        }
        // Ajouter à la liste locale pour affichage immédiat
        ACCOUNTS.push({
          id: result.user_id||'pending_'+uid(), nom, email, role, av, poste,
          eId:'e1', actif:true, chantierIds:chIds, createdAt:td(), _pending:true
        });
        toast(`✉️ Invitation envoyée à ${email} !`,'g');
      }catch(err){
        toast('Erreur invitation : '+err.message,'r');
        if(btn){btn.disabled=false; btn.textContent="✉️ Envoyer l'invitation";}
        return;
      }
    }
    // ── MODE LOCAL : création directe ────────────────────────────────────
    else {
      const pass=document.getElementById('inv-pass')?.value;
      const pass2=document.getElementById('inv-pass2')?.value;
      if(!pass)     {toast('Le mot de passe est obligatoire','r');if(btn)btn.disabled=false;return;}
      if(pass.length<8){toast('Min. 8 caractères','r');if(btn)btn.disabled=false;return;}
      if(pass!==pass2) {toast('Les mots de passe ne correspondent pas','r');if(btn)btn.disabled=false;return;}
      ACCOUNTS.push({
        id:'u'+uid(), nom, email, pass, role, av,
        eId:'e1', poste, actif:true, chantierIds:chIds, createdAt:td()
      });
      toast(`Compte de ${nom} créé ✓ · Mot de passe provisoire communiqué`,'g');
    }

    addAudit(`Invitation envoyée : ${nom} (${role}) — ${email}`,'info');
    go('c_users',{itab:'list'});
  });

  // Enregistrer modification
  document.getElementById('save-edit-user')?.addEventListener('click',async()=>{
    const editU=ACCOUNTS.find(a=>a.id===S.params.editId);
    if(!editU)return;
    editU.nom   = document.getElementById('edit-nom')?.value.trim()||editU.nom;
    editU.email = document.getElementById('edit-email')?.value.trim()||editU.email;
    editU.poste = document.getElementById('edit-poste')?.value.trim();
    editU.role  = document.getElementById('edit-role')?.value||editU.role;
    editU.av    = document.getElementById('edit-av')?.value.trim().toUpperCase()||editU.av;
    editU.chantierIds=editU.role==='conducteur'
      ? D.chantiers.map(c=>c.id)
      : [...(document.querySelectorAll('.edit-ch:checked')||[])].map(el=>el.dataset.cid);
    const newPass=document.getElementById('edit-pass')?.value;
    const newPass2=document.getElementById('edit-pass2')?.value;
    if(newPass){
      if(newPass.length<8){toast('Min. 8 caractères','r');return;}
      if(newPass!==newPass2){toast('Les mots de passe ne correspondent pas','r');return;}
      if(!SB) editU.pass=newPass;
    }
    if(SB){
      const{error}=await SB.from('profiles').update({
        nom:editU.nom,email:editU.email,poste:editU.poste,
        role:editU.role,av:editU.av,chantier_ids:editU.chantierIds
      }).eq('id',editU.id);
      if(error){toast('Erreur mise à jour : '+error.message,'r');return;}
    }
    addAudit(`Compte ${editU.nom} modifié`,'info');
    toast(`${editU.nom} mis à jour ✓`,'g');
    go('c_users',{itab:'list'});
  });

  // Supprimer
  document.getElementById('del-user')?.addEventListener('click',async()=>{
    const editU=ACCOUNTS.find(a=>a.id===S.params.editId);
    if(!editU||!confirm(`Supprimer le compte de ${editU.nom} ?\nCette action est irréversible.`))return;
    if(SB){
      await SB.from('profiles').delete().eq('id',editU.id).catch(()=>{});
    }
    ACCOUNTS.splice(ACCOUNTS.findIndex(a=>a.id===editU.id),1);
    addAudit(`Compte ${editU.nom} supprimé`,'warn');
    toast(`Compte de ${editU.nom} supprimé`,'a');
    go('c_users',{itab:'list'});
  });
}

function bindCParams(){
  document.getElementById('save-ent')?.addEventListener('click',()=>{
    const nom  = document.getElementById('p-nom')?.value.trim();
    const logo = document.getElementById('p-logo')?.value.trim()||'🏗️';
    if(!nom){toast('Le nom est obligatoire','r');return;}
    if(!ENTS[0]) ENTS.push({id:'e1'});
    Object.assign(ENTS[0],{
      nom, logo,
      adresse: document.getElementById('p-adr')?.value.trim(),
      tva:     document.getElementById('p-tva')?.value.trim(),
      tel:     document.getElementById('p-tel')?.value.trim(),
      email:   document.getElementById('p-email')?.value.trim(),
      iban:    document.getElementById('p-iban')?.value.trim(),
    });
    addAudit(`Paramètres entreprise mis à jour — ${nom}`,'info');
    sbSaveEntreprise(ENTS[0]).catch(()=>{});
    toast(`${nom} enregistré ✓`,'g');
    render();
  });

  // Changer mot de passe (mode local)
  document.getElementById('save-mypass')?.addEventListener('click',()=>{
    const old=document.getElementById('p-oldpass')?.value;
    const p1 =document.getElementById('p-newpass')?.value;
    const p2 =document.getElementById('p-newpass2')?.value;
    const u=ACCOUNTS.find(a=>a.id===S.user?.id);
    if(!u)return;
    if(old&&u.pass!==old){toast('Mot de passe actuel incorrect','r');return;}
    if(!p1||p1.length<8){toast('Min. 8 caractères','r');return;}
    if(p1!==p2){toast('Les mots de passe ne correspondent pas','r');return;}
    u.pass=p1; addAudit('Mot de passe changé','info'); toast('Mot de passe mis à jour ✓','g');
  });

  // Réinitialisation via Supabase
  document.getElementById('sb-reset-pass')?.addEventListener('click',async()=>{
    if(!SB){toast('Supabase non configuré','r');return;}
    const{error}=await SB.auth.resetPasswordForEmail(S.user?.email,{
      redirectTo:window.location.origin+window.location.pathname
    });
    if(error) toast('Erreur : '+error.message,'r');
    else toast('Email de réinitialisation envoyé à '+S.user?.email+' ✓','g');
  });

  // Sauvegarder config Supabase
  document.getElementById('save-sb-config')?.addEventListener('click',async()=>{
    const url=document.getElementById('sb-url')?.value.trim();
    const key=document.getElementById('sb-key')?.value.trim();
    if(!url||!key){toast('URL et clé obligatoires','r');return;}
    if(!url.includes('.supabase.co')){toast("L'URL doit être de la forme https://xxx.supabase.co",'r');return;}
    // Stocker en localStorage pour persistance
    try{localStorage.setItem('bp_sb_url',url);localStorage.setItem('bp_sb_key',key);}catch(e){}
    // Tester la connexion
    try{
      const testSB=window.supabase.createClient(url,key);
      const{error}=await testSB.from('profiles').select('id').limit(1);
      if(error&&error.code!=='42P01'&&error.message!=='JSON object requested, multiple (or no) rows returned'){
        toast('Connexion échouée : '+error.message,'r');return;
      }
      toast('✅ Connexion Supabase réussie ! Rechargez la page.','g');
      addAudit('Configuration Supabase mise à jour','info');
    }catch(err){toast('Erreur test connexion : '+err.message,'r');}
  });
}

function pgFRot(){
  const u  = S.user;
  const tr = D.transporteurs.find(t=>t.userId===u?.id||t.email===u?.email)||D.transporteurs[0];
  const bul = D.bulletins.find(b=>b.id===S.cf.curBulId&&b.statut==='en_cours');
  const step = S.params.step||'type';
  const selType = S.params.type||'deblais';
  const selCh = bul?.cId;

  if(!bul) return fLayout(`<div class="al al-r">Démarrez d'abord un bulletin.</div><button class="bbtn" onclick="go('f_bul')">← Retour</button>`);

  let content='';

  if(step==='type'){
    content=`
      <div style="font-size:16px;font-weight:700;margin-bottom:16px">Type de rotation</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${[
          {t:'deblais',ico:'▼',lbl:'Déblais',desc:'Évacuation de terres / déchets vers une décharge',col:'var(--rd)',bg:'#fef2f2'},
          {t:'apport', ico:'▲',lbl:'Apport',  desc:'Livraison de matériaux sur le chantier',col:'var(--gn)',bg:'#f0fdf4'},
          {t:'regie',  ico:'⏱',lbl:'Régie',   desc:'Travaux facturés à l\'heure',col:'var(--bl)',bg:'#eff6ff'},
        ].map(x=>`<button onclick="go('f_rot',{step:'detail',type:'${x.t}'})"
          style="padding:18px;border-radius:12px;border:2px solid ${x.col};background:${x.bg};cursor:pointer;text-align:left;transition:all .2s">
          <div style="font-size:22px;margin-bottom:6px">${x.ico}</div>
          <div style="font-size:16px;font-weight:800;color:${x.col}">${x.lbl}</div>
          <div style="font-size:12px;color:var(--mu);margin-top:4px">${x.desc}</div>

    const lieux = selType==='deblais' ? (tc?.deblais?.map(d=>d.lieu)||LIEUX_DECHARGE.map(l=>l.nom)) : [];
    const mats  = selType==='apport'  ? (tc?.apports?.map(a=>a.mat)||MATERIAUX_APPORT.map(m=>m.nom)) : [];

    content=`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
        <button class="btn bsm" onclick="go('f_rot',{step:'type'})">← Retour</button>
        <span style="font-size:16px;font-weight:700">${{deblais:'▼ Déblais',apport:'▲ Apport',regie:'⏱ Régie'}[selType]}</span>
      </div>
      ${selType==='deblais'?`
        <div class="fg"><label class="fl">Lieu de décharge *</label>
          <select class="fi" id="rot-lieu">
            <option value="">-- Sélectionner --</option>
            ${lieux.map(l=>`<option>${l}</option>`).join('')}
          </select></div>
        <div class="frow">
          <div class="fg"><label class="fl">Voyages</label>
            <input class="fi" type="number" id="rot-voy" min="0" step="1" placeholder="0"></div>
          <div class="fg"><label class="fl">Tonnes (si pesée)</label>
            <input class="fi" type="number" id="rot-t" min="0" step="0.1" placeholder="0.0"></div>
        </div>
        <div class="fg"><label class="fl">Attente (min)</label>
          <input class="fi" type="number" id="rot-att" min="0" step="5" value="0"></div>
      `:''}
      ${selType==='apport'?`
        <div class="fg"><label class="fl">Matériau *</label>
          <select class="fi" id="rot-mat">
            <option value="">-- Sélectionner --</option>
            ${mats.map(m=>`<option>${m}</option>`).join('')}
            <option value="__nouveau__">✏️ Autre matériau...</option>
          </select></div>
        <div id="rot-mat-custom-wrap" style="display:none">
          <input class="fi" id="rot-mat-custom" placeholder="Nom du matériau"></div>
        <div class="frow">
          <div class="fg"><label class="fl">Voyages</label>
            <input class="fi" type="number" id="rot-voy" min="0" step="1" placeholder="0"></div>
          <div class="fg"><label class="fl">Tonnes (si pesée)</label>
            <input class="fi" type="number" id="rot-t" min="0" step="0.1" placeholder="0.0"></div>
        </div>
      `:''}
      ${selType==='regie'?`
        <div class="fg"><label class="fl">Description *</label>
          <input class="fi" id="rot-desc" placeholder="Ex: Travaux imprévus — canalisation"></div>

  return fLayout(`

function bindFLayout(){
  // Start bulletin
  document.getElementById('start-bul')?.addEventListener('click',()=>{
    const cId=document.getElementById('new-bul-ch')?.value;
    const veh=document.getElementById('new-bul-veh')?.value.trim();
    const h0 =document.getElementById('new-bul-h0')?.value||th();
    if(!cId){toast('Sélectionnez un chantier','r');return;}
    const tr=D.transporteurs.find(t=>t.userId===S.user?.id||t.email===S.user?.email)||D.transporteurs[0];
    const num_bul=`BUL-${new Date().getFullYear()}-${String(D.nextBul).padStart(4,'0')}`;
    D.nextBul++;
    const bul={id:'b'+uid(),num:num_bul,cId,tId:tr?.id,vehicule:veh,
      chauffeur:S.user?.nom,date:td(),statut:'en_cours',h0,h1:null,signed:false};
    D.bulletins.push(bul);
    S.cf.curBulId=bul.id;
    addAudit(`Bulletin ${num_bul} démarré`,'info');
    toast(`Bulletin ${num_bul} démarré ✓`);
    go('f_bul');
  });

  // Finish bulletin
  document.getElementById('finish-bul')?.addEventListener('click',()=>{
    const bul=D.bulletins.find(b=>b.id===S.cf.curBulId);
    if(!bul)return;
    if(lgsBul(bul.id).length===0&&!confirm('Aucune rotation saisie. Terminer quand même ?'))return;
    bul.statut='termine'; bul.h1=th();
    addAudit(`Bulletin ${bul.num} terminé`,'info');
    toast(`Bulletin ${bul.num} terminé ✓`,'g');
    S.cf.curBulId=null;
    go('f_histo');
  });

  // Save rotation
  document.getElementById('save-rot')?.addEventListener('click',()=>{
    const bul=D.bulletins.find(b=>b.id===S.cf.curBulId);
    if(!bul){toast('Aucun bulletin en cours','r');return;}
    const selType=S.params.type||'deblais';
    const tr=D.transporteurs.find(t=>t.userId===S.user?.id||t.email===S.user?.email)||D.transporteurs[0];
    let ligne={id:'l'+uid(),bId:bul.id,type:selType};

    if(selType==='deblais'){
      const lieu=document.getElementById('rot-lieu')?.value;
      if(!lieu){toast('Sélectionnez un lieu','r');return;}
      ligne={...ligne,lieu,voyages:parseInt(document.getElementById('rot-voy')?.value)||0,
        t:parseFloat(document.getElementById('rot-t')?.value)||0,
        att:parseInt(document.getElementById('rot-att')?.value)||0,
        saisieMode:'benne'};
    } else if(selType==='apport'){
      let mat=document.getElementById('rot-mat')?.value;
      if(mat==='__nouveau__') mat=document.getElementById('rot-mat-custom')?.value.trim();
      if(!mat){toast('Sélectionnez un matériau','r');return;}
      ligne={...ligne,mat,voyages:parseInt(document.getElementById('rot-voy')?.value)||0,
        t:parseFloat(document.getElementById('rot-t')?.value)||0,saisieMode:'benne'};
    } else {
      const desc=document.getElementById('rot-desc')?.value.trim();
      if(!desc){toast('Saisissez une description','r');return;}
      ligne={...ligne,desc,h:parseFloat(document.getElementById('rot-h')?.value)||1,
        taux:parseFloat(document.getElementById('rot-taux')?.value)||95};
    }

    D.lignes.push(ligne);
    addAudit(`Rotation ajoutée — ${selType} — bulletin ${bul.num}`,'info');
    toast('Rotation ajoutée ✓','g');
    go('f_bul');
  });

  // Custom mat toggle
  document.getElementById('rot-mat')?.addEventListener('change',e=>{
    const w=document.getElementById('rot-mat-custom-wrap');
    if(w) w.style.display=e.target.value==='__nouveau__'?'block':'none';
  });
}




// ── CM HOME : Liste des rapports du contremaître ──────────────────────────────
function pgCMHome(){
  const u = S.user;
  const myCh = D.chantiers.filter(c=>(u?.chantierIds||[]).includes(c.id));
  const myRaps = D.rapports
    .filter(r=>(u?.chantierIds||[]).includes(r.cId))
    .sort((a,b)=>b.date.localeCompare(a.date));

  // KPIs statuts
  const nDraft    = myRaps.filter(r=>r.status==='draft').length;
  const nSubmit   = myRaps.filter(r=>r.status==='submitted').length;
  const nValid    = myRaps.filter(r=>r.status==='validated').length;
  const nReject   = myRaps.filter(r=>r.status==='rejected').length;

  // Prix de revient cumulé (rapports validés uniquement)
  const validRaps = myRaps.filter(r=>r.status==='validated');
  const totMO  = validRaps.reduce((s,r)=>s+rCostMO(r),0);
  const totMac = validRaps.reduce((s,r)=>s+rCostMachines(r),0);
  const totMat = validRaps.reduce((s,r)=>s+rCostMats(r),0);
  const totHMO = validRaps.reduce((s,r)=>s+(r.personnel||[]).reduce((s2,p)=>s2+(p.nh||0)+(p.rh||0),0),0);

  // Derniers 7 jours
  const today = new Date(); 
  const last7 = Array.from({length:7},(_,i)=>{
    const d=new Date(today); d.setDate(today.getDate()-i);
    return d.toISOString().split('T')[0];
  }).reverse();

  return cmLayout(`
    <!-- Alerte rapports à corriger -->
    ${nReject?`<div style="border:2px solid var(--rd);background:var(--rdl);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">

        <div style="font-size:14px;font-weight:700;color:var(--rd)">${nReject} rapport(s) renvoyé(s) pour correction</div>
        <div style="font-size:12px;color:var(--rd);margin-top:2px">Le conducteur de travaux a demandé des corrections. Ouvrez les rapports ci-dessous.</div>
      </div>
    </div>`:''}

    <!-- KPIs statuts -->
    <div class="g4" style="margin-bottom:16px">
      <div class="sc" style="cursor:pointer" onclick="go('cm_home')">
        <div class="sl">Brouillons</div>
        <div class="sv" style="color:var(--mu)">${nDraft}</div>
        <div style="font-size:10px;color:var(--mu)">à compléter</div>
      </div>
      <div class="sc">
        <div class="sl">En attente</div>
        <div class="sv" style="color:var(--bl)">${nSubmit}</div>
        <div style="font-size:10px;color:var(--mu)">chez le conducteur</div>
      </div>
      <div class="sc">
        <div class="sl">Validés</div>
        <div class="sv" style="color:var(--gn)">${nValid}</div>
        <div style="font-size:10px;color:var(--mu)">${totHMO.toFixed(0)} h MO cumulées</div>
      </div>
      <div class="sc">
        <div class="sl">À corriger</div>
        <div class="sv" style="color:${nReject?'var(--rd)':'var(--mu)'}">${nReject}</div>
        <div style="font-size:10px;color:var(--mu)">action requise</div>
      </div>
    </div>

    <!-- Prix de revient cumulé (rapports validés) -->
    ${validRaps.length?`<div class="card" style="margin-bottom:14px">
      <div class="ch"><span class="ct">💰 Prix de revient cumulé — rapports validés</span>
        <span style="font-size:11px;color:var(--mu)">${validRaps.length} rapport(s)</span>
      </div>
      <div class="g3">
        <div style="text-align:center;padding:12px 8px;background:var(--bll);border-radius:var(--r10)">

function bindCMRapport(){
  const re=S.rapEdit;if(!re)return;
  document.getElementById('re-date')?.addEventListener('change',e=>{re.date=e.target.value;re.week=getWeek(e.target.value);});
  document.getElementById('re-chantier')?.addEventListener('change',e=>{re.cId=e.target.value;});
  document.getElementById('re-obs')?.addEventListener('input',e=>re.obs=e.target.value);
  document.getElementById('re-tmin')?.addEventListener('change',e=>re.weather={...re.weather,tmin:parseInt(e.target.value)||0});
  document.getElementById('re-tmax')?.addEventListener('change',e=>re.weather={...re.weather,tmax:parseInt(e.target.value)||0});

  document.getElementById('save-rap')?.addEventListener('click',async()=>{
    const ex=D.rapports.findIndex(x=>x.id===re.id);
    if(ex>=0)D.rapports[ex]={...re};else D.rapports.push({...re});
    if(SB){
      await SB.from('rapports').upsert({
        id:re.id, c_id:re.cId, date:re.date, week:re.week,
        weather:re.weather, tasks:re.tasks, personnel:re.personnel,
        machines:re.machines, materials:re.materials, sse:re.sse,
        transports:re.transports, obs:re.obs, status:re.status||'draft',
        owner_id:S.user?.id
      });
    }
    persistSave();
    addAudit(`Rapport ${re.date} enregistré par ${S.user?.nom}`,'info');
    toast('Rapport enregistré ✓');S.rapEdit=null;go('cm_home');
  });

  document.getElementById('submit-rap')?.addEventListener('click',async()=>{
    re.status='submitted';re.submitted=td();
    const ex=D.rapports.findIndex(x=>x.id===re.id);
    if(ex>=0)D.rapports[ex]={...re};else D.rapports.push({...re});
    if(SB){
      await SB.from('rapports').upsert({
        id:re.id, c_id:re.cId, date:re.date, week:re.week,
        weather:re.weather, tasks:re.tasks, personnel:re.personnel,
        machines:re.machines, materials:re.materials, sse:re.sse,
        transports:re.transports, obs:re.obs, status:'submitted',
        submitted_at:new Date().toISOString(), owner_id:S.user?.id
      });
    }
    persistSave();
    addAudit(`Rapport ${re.date} soumis par ${S.user?.nom} pour validation`,'info');
    toast('Rapport soumis ✓ — Le conducteur de travaux va valider votre rapport.');
    S.rapEdit=null; go('cm_home');
  });
}

// Photo capture helper
function capturePhoto(inputId, previewId){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.capture='environment';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const b64=ev.target.result;
      const prev=document.getElementById(previewId);
      if(prev){prev.src=b64;prev.style.display='block';}
      // Store in S for current form
      if(!S.photos)S.photos={};
      S.photos[inputId]=b64;
      toast('Photo ajoutée ✓','g');
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

// ─ PDF Bulletin ────────────────────────────────────────────────────────────────
function exportBulletinPDF(bId){
  const bul=D.bulletins.find(b=>b.id===bId);
  if(!bul){toast('Bulletin introuvable','r');return;}
  const tr=D.transporteurs.find(t=>t.id===bul.tId);
  const ch=D.chantiers.find(c=>c.id===bul.cId);
  const ls=lgsBul(bId);
  const cap=tr?.capBenne||16;

  if(!window.jspdf){toast('Chargement PDF en cours...','g');
    setTimeout(()=>exportBulletinPDF(bId),800);return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210, M=14, Y0=14;
  let y=Y0;

  // ── Header ──
  doc.setFillColor(13,148,136);
  doc.rect(0,0,W,32,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');
  doc.setFontSize(20);
  doc.text('BulletinsPro',M,12);
  doc.setFontSize(9);
  doc.setFont('helvetica','normal');
  doc.text('Bulletin de transport numérique · Suisse',M,18);
  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.text(`${bul.num} · ${ch?.code} — ${ch?.nom}`,M,25);
  // Badge date
  doc.setFillColor(7,102,91);
  doc.roundedRect(W-52,4,38,12,3,3,'F');
  doc.setFontSize(9);
  doc.text(bul.date,W-50,11.5);
  y=40;

  // ── Parties ──
  doc.setTextColor(100,116,139);doc.setFont('helvetica','normal');doc.setFontSize(8);
  doc.text('DONNEUR D\'ORDRE',M,y);
  doc.text('TRANSPORTEUR',W/2+4,y);
  y+=5;
  doc.setTextColor(15,23,42);doc.setFont('helvetica','bold');doc.setFontSize(10);
  doc.text(ch?.client||'',M,y);
  doc.text(tr?.nom||'',W/2+4,y);
  y+=5;
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(100,116,139);
  doc.text(`Conducteur: ${bul.chauffeur||''}`,M,y);
  doc.text(`Contact: ${tr?.contact||''} · ${tr?.tel||''}`,W/2+4,y);
  y+=4;
  doc.text(`Véhicule: ${bul.vehicule} · Mode: ${tr?.modeFact==='benne'?`Benne ${cap}m³`:'Pesée tonnes'}`,M,y);
  doc.text(`${bul.h0} → ${bul.h1||'...'}`,W/2+4,y);
  y+=8;

  // ── Divider ──
  doc.setDrawColor(226,232,240);doc.setLineWidth(.4);
  doc.line(M,y,W-M,y);y+=6;

  // ── Rotations ──
  doc.setFillColor(247,250,252);
  doc.rect(M,y,W-2*M,7,'F');
  doc.setTextColor(100,116,139);doc.setFont('helvetica','bold');doc.setFontSize(8);
  doc.text('TYPE',M+2,y+4.5);
  doc.text('LIEU / MATÉRIAU',M+22,y+4.5);
  doc.text('QUANTITÉ',M+90,y+4.5);
  doc.text('TARIF',M+120,y+4.5);
  doc.text('MONTANT HT',W-M-2,y+4.5,'right');
  y+=7;
  doc.setLineWidth(.3);

  let totalHT=0;
  ls.forEach((l,i)=>{
    if(y>270){doc.addPage();y=20;}
    const tarif=getTarifLigne(l,tr,bul.cId);
    const c2=tarif?.cap||cap;
    const vol=l.voyages>0?l.voyages*c2:l.v||l.t*0.75;
    const t=l.voyages>0?l.voyages*c2*0.75:l.t;
    const mnt=tarif?(tarif.mode==='tonne'?t*tarif.prix:vol*tarif.prix):0;
    totalHT+=mnt;
    const isVoy=l.voyages>0;
    const typeStr=l.type==='deblais'?'▼ Déblais':'▲ Apport';
    const lieuStr=l.type==='deblais'?l.lieu:l.mat;
    const qteStr=isVoy?`${l.voyages} voy × ${c2}m³ = ${num(vol,0)} m³`:`${num(t,1)} t`;
    const tarifStr=tarif?`${tarif.prix} CHF/${tarif.mode==='tonne'?'t':'m³'}`:'—';

    if(i%2===0){doc.setFillColor(250,252,255);doc.rect(M,y,W-2*M,7,'F');}
    doc.setTextColor(l.type==='deblais'?[220,38,38]:[56,161,105]);
    doc.setFont('helvetica','bold');doc.setFontSize(8);
    doc.text(typeStr,M+2,y+4.5);
    doc.setTextColor(15,23,42);doc.setFont('helvetica','normal');
    doc.text(lieuStr.substring(0,28),M+22,y+4.5);
    doc.text(qteStr,M+90,y+4.5);
    doc.text(tarifStr,M+120,y+4.5);
    if(mnt>0){doc.setFont('helvetica','bold');doc.setTextColor(124,58,237);}
    doc.text(mnt>0?`${f2(mnt)} CHF`:'—',W-M-2,y+4.5,'right');
    doc.setTextColor(226,232,240);doc.line(M,y+7,W-M,y+7);
    y+=7;
  });
  y+=4;

  // ── Totaux ──
  const tva=totalHT*.081;
  doc.setFillColor(230,255,250);
  doc.rect(W/2,y,W/2-M,28,'F');
  doc.setTextColor(100,116,139);doc.setFont('helvetica','normal');doc.setFontSize(8);
  doc.text('Total HT',W/2+4,y+6);
  doc.text('TVA 8.1%',W/2+4,y+12);
  doc.setTextColor(15,23,42);doc.setFont('helvetica','bold');doc.setFontSize(9);
  doc.text('TOTAL TTC',W/2+4,y+21);
  doc.setTextColor(100,116,139);doc.setFont('helvetica','normal');doc.setFontSize(8);
  doc.text(`${f2(totalHT)} CHF`,W-M-2,y+6,'right');
  doc.text(`${f2(tva)} CHF`,W-M-2,y+12,'right');
  doc.setTextColor(13,148,136);doc.setFont('helvetica','bold');doc.setFontSize(11);
  doc.text(`${f2(totalHT+tva)} CHF`,W-M-2,y+21,'right');
  y+=34;

  // ── Signature ──
  if(y<240){
    doc.setDrawColor(226,232,240);doc.setLineWidth(.4);
    doc.line(M,y,W-M,y);y+=8;
    doc.setTextColor(100,116,139);doc.setFontSize(8);doc.setFont('helvetica','bold');
    doc.text('VISA CONDUCTEUR DE TRAVAUX',M,y);doc.text('VISA TRANSPORTEUR',W/2+4,y);
    y+=4;
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(15,23,42);
    doc.text(`${bul.chauffeur||''}`,M,y);doc.text(`${tr?.contact||''}`,W/2+4,y);
    y+=3;
    doc.setDrawColor(203,213,225);doc.setFillColor(247,250,252);
    doc.roundedRect(M,y,82,18,2,2,'FD');
    doc.roundedRect(W/2+4,y,82,18,2,2,'FD');
    doc.setTextColor(160,174,192);doc.setFontSize(7);
    doc.text('Signature et tampon',M+2,y+5);
    doc.text('Signature et tampon',W/2+6,y+5);
    y+=24;
  }

  // ── Footer ──
  doc.setFillColor(247,250,252);
  doc.rect(0,285,W,12,'F');
  doc.setTextColor(160,174,192);doc.setFont('helvetica','normal');doc.setFontSize(7);
  doc.text(`BulletinsPro · ${bul.num} · ${ch?.nom} · Généré le ${new Date().toLocaleDateString('fr-CH')}`,M,291);
  doc.text(`${tr?.tva_nr||tr?.nom||''}`,W-M,291,'right');

  doc.save(`${bul.num}_${ch?.code}.pdf`);
  addAudit(`PDF bulletin ${bul.num} exporté`,'info');
  toast(`PDF ${bul.num} téléchargé ✓`,'g');
}

  doc.save(`Facturation_${tr.nom.replace(/\s/g,'_')}_${ch.code}.pdf`);
  addAudit(`PDF facturation ${tr.nom} / ${ch.nom} exporté`,'info');
  toast('PDF facturation téléchargé ✓','g');
}

// ─ PDF Taxes ───────────────────────────────────────────────────────────────────
function exportTaxesPDF(cId){
  const ch=D.chantiers.find(c=>c.id===cId);
  if(!ch){toast('Chantier introuvable','r');return;}
  if(!window.jspdf){toast('Chargement PDF...','g');setTimeout(()=>exportTaxesPDF(cId),800);return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,M=14;let y=14;
  const lignes=calcTaxesBulletins(cId);
  const grille=TAXES_GRILLE[cId]||{};
  const totalTaxes=lignes.reduce((s,l)=>s+l.mnt,0);
  const tva=totalTaxes*.081;

  // Header
  doc.setFillColor(124,58,237);doc.rect(0,0,W,22,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(14);
  doc.text('TAXES DE DÉCHARGE',M,9);
  doc.setFont('helvetica','normal');doc.setFontSize(8);
  doc.text(`Chantier ${ch.code} — ${ch.nom} · ${new Date().toLocaleDateString('fr-CH')}`,M,16);
  y=30;

  // Grille tarifaire
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(15,23,42);
  doc.text('GRILLE TARIFAIRE NÉGOCIÉE',M,y);y+=5;
  doc.setFillColor(247,250,252);doc.rect(M,y,W-2*M,5,'F');
  doc.setTextColor(100,116,139);doc.setFont('helvetica','bold');doc.setFontSize(7);
  doc.text('LIEU DE DÉCHARGE',M+2,y+3.5);doc.text('UNITÉ',M+80,y+3.5);
  doc.text('TARIF',M+105,y+3.5);doc.text('NOTE',M+130,y+3.5);y+=5;
  Object.entries(grille).forEach(([lieu,tx],i)=>{
    if(i%2===0){doc.setFillColor(252,253,254);doc.rect(M,y,W-2*M,5,'F');}
    doc.setTextColor(15,23,42);doc.setFont('helvetica','normal');doc.setFontSize(8);
    doc.text(lieu.substring(0,38),M+2,y+3.5);
    doc.text(tx.unit==='t'?'CHF/tonne':'CHF/m³',M+80,y+3.5);
    doc.setFont('helvetica','bold');doc.setTextColor(124,58,237);
    doc.text(`${tx.tarif.toFixed(2)} CHF`,M+105,y+3.5);
    doc.setFont('helvetica','normal');doc.setTextColor(100,116,139);
    doc.text((tx.note||'').substring(0,25),M+130,y+3.5);y+=5;
  });
  y+=6;

  // Taxes par bulletin
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(15,23,42);
  doc.text('DÉTAIL PAR BULLETIN',M,y);y+=5;
  doc.setFillColor(247,250,252);doc.rect(M,y,W-2*M,5,'F');
  doc.setTextColor(100,116,139);doc.setFont('helvetica','bold');doc.setFontSize(7);
  doc.text('BULLETIN',M+2,y+3.5);doc.text('TRANSPORTEUR',M+30,y+3.5);
  doc.text('LIEU',M+75,y+3.5);doc.text('QTÉ',M+130,y+3.5);
  doc.text('TAXE HT',W-M-2,y+3.5,'right');y+=5;
  lignes.forEach((l,i)=>{
    if(y>270){doc.addPage();y=20;}
    const qte=l.unit==='m3'?`${l.totalV.toFixed(1)} m³`:`${l.totalT.toFixed(1)} t`;
    if(i%2===0){doc.setFillColor(252,253,254);doc.rect(M,y,W-2*M,5,'F');}
    doc.setTextColor(15,23,42);doc.setFont('helvetica','normal');doc.setFontSize(7.5);
    doc.text(l.bul.num,M+2,y+3.5);
    doc.text(l.transporteur.substring(0,22),M+30,y+3.5);
    doc.text(l.lieu.substring(0,28),M+75,y+3.5);
    doc.text(qte,M+130,y+3.5);
    doc.setFont('helvetica','bold');doc.setTextColor(l.hasTarif?[124,58,237]:[220,38,38]);
    doc.text(l.hasTarif?`${f2(l.mnt)} CHF`:'Tarif manquant',W-M-2,y+3.5,'right');y+=5;
  });
  y+=6;
  // Total
  doc.setFillColor(245,243,255);doc.rect(W/2-4,y,W/2-M+4,18,'F');
  doc.setTextColor(100,116,139);doc.setFont('helvetica','normal');doc.setFontSize(8);
  doc.text('Total HT taxes',W/2,y+5);doc.text(`${f2(totalTaxes)} CHF`,W-M-2,y+5,'right');
  doc.text('TVA 8.1%',W/2,y+10);doc.text(`${f2(tva)} CHF`,W-M-2,y+10,'right');
  doc.setFillColor(124,58,237);doc.rect(W/2-4,y+13,W/2-M+4,7,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(9);
  doc.text('TOTAL TTC',W/2,y+17.5);doc.text(`${f2(totalTaxes+tva)} CHF`,W-M-2,y+17.5,'right');

  doc.save(`Taxes_${ch.code}_${ch.nom.replace(/\s/g,'_')}.pdf`);
  addAudit(`PDF taxes ${ch.nom} exporté`,'info');
  toast('PDF taxes téléchargé ✓','g');
}

// ─ Excel : Rotations ──────────────────────────────────────────────────────────
function exportRotationsExcel(cId){
  if(!window.XLSX){toast('Chargement Excel...','g');setTimeout(()=>exportRotationsExcel(cId),800);return;}
  const ch=D.chantiers.find(c=>c.id===cId);
  const buls=D.bulletins.filter(b=>b.cId===cId);
  const rows=[['N° Bulletin','Date','Transporteur','Véhicule','Type','Lieu / Matériau','Type déblais','Voyages','Tonnes','Volume m³','Mode','Tarif CHF','Montant HT','Attente min']];
  buls.forEach(bul=>{
    const tr=D.transporteurs.find(t=>t.id===bul.tId);
    const cap=tr?.capBenne||16;
    lgsBul(bul.id).forEach(l=>{
      const ta=getTarifLigne(l,tr,cId);
      const vol=l.voyages>0?l.voyages*(ta?.cap||cap):l.v||l.t*0.75;
      const t=l.voyages>0?l.voyages*(ta?.cap||cap)*0.75:l.t;
      const mnt=ta?(ta.mode==='tonne'?t*ta.prix:vol*ta.prix):0;
      rows.push([
        bul.num,bul.date,tr?.nom||'',bul.vehicule,
        l.type==='deblais'?'Déblais':'Apport',
        l.type==='deblais'?l.lieu:l.mat,
        l.typeMatx||'',l.voyages||'',
        parseFloat(t.toFixed(1)),parseFloat(vol.toFixed(1)),
        l.saisieMode==='pes'?'Pesée tonnes':'Voyages m³',
        ta?ta.prix:'',mnt?parseFloat(mnt.toFixed(2)):'',l.att||0
      ]);
    });
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:16},{wch:10},{wch:22},{wch:12},{wch:8},{wch:28},{wch:24},{wch:8},{wch:8},{wch:10},{wch:16},{wch:10},{wch:12},{wch:10}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Rotations');
  XLSX.writeFile(wb,`Rotations_${ch?.code||cId}_${new Date().toISOString().split('T')[0]}.xlsx`);
  addAudit(`Excel rotations ${ch?.nom} exporté`,'info');
  toast('Excel rotations téléchargé ✓','g');
}

// ─ Excel : Facturation ────────────────────────────────────────────────────────
function exportFacturationExcel(trId,cId){
  if(!window.XLSX){toast('Chargement Excel...','g');setTimeout(()=>exportFacturationExcel(trId,cId),800);return;}
  const tr=D.transporteurs.find(t=>t.id===trId);
  const ch=D.chantiers.find(c=>c.id===cId);
  const rec=buildRecap(tr,cId);
  const tva=rec.totalHT*.081;

  const wb=XLSX.utils.book_new();

  // Sheet 1 : Récap
  const recapRows=[
    ['RÉCAPITULATIF DE FACTURATION'],[''],
    ['Transporteur',tr?.nom],['Chantier',`${ch?.code} — ${ch?.nom}`],
    ['Date',new Date().toLocaleDateString('fr-CH')],['Mode facturation',tr?.modeFact==='benne'?`Benne ${tr.capBenne}m³`:'Pesée'],[''],
    ['TYPE','LIEU / MATÉRIAU','CATÉGORIE','QUANTITÉ','UNITÉ','TARIF CHF','MONTANT HT'],
  ];
  rec.groups.filter(g=>g.type==='deblais').forEach(g=>{
    const qte=g.voy>0?num(g.v,0):num(g.t,1);
    recapRows.push(['Déblais',g.lieu,g.typeMatx||'',parseFloat(qte),g.unit,g.prix,parseFloat(num(g.mnt,2))]);
  });
  recapRows.push(['','','','','','Sous-total déblais',parseFloat(rec.tDeb.toFixed(2))]);
  rec.groups.filter(g=>g.type==='apport').forEach(g=>{
    const qte=g.voy>0?num(g.v,0):num(g.t,1);
    recapRows.push(['Apport',g.mat,g.car||'',parseFloat(qte),g.unit,g.prix,parseFloat(num(g.mnt,2))]);
  });
  recapRows.push(['','','','','','Sous-total apports',parseFloat(rec.tApp.toFixed(2))]);
  recapRows.push(['','','','','','Sous-total régie',parseFloat(rec.tReg.toFixed(2))]);
  recapRows.push(['','','','','','Total HT',parseFloat(rec.totalHT.toFixed(2))]);
  recapRows.push(['','','','','','TVA 8.1%',parseFloat(tva.toFixed(2))]);
  recapRows.push(['','','','','','TOTAL TTC',parseFloat((rec.totalHT+tva).toFixed(2))]);

  const ws1=XLSX.utils.aoa_to_sheet(recapRows);
  ws1['!cols']=[{wch:10},{wch:28},{wch:26},{wch:10},{wch:8},{wch:18},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws1,'Récapitulatif');

  // Sheet 2 : Détail bulletins
  const detailRows=[['N° Bulletin','Date','Lieu / Matériau','Quantité','Unité','Tarif','Montant HT']];
  const buls=D.bulletins.filter(b=>b.tId===trId&&b.cId===cId);
  buls.forEach(bul=>{
    lgsBul(bul.id).forEach(l=>{
      const ta=getTarifLigne(l,tr,cId);
      const cap=tr?.capBenne||16;
      const vol=l.voyages>0?l.voyages*(ta?.cap||cap):l.v||l.t*0.75;
      const t=l.voyages>0?l.voyages*(ta?.cap||cap)*0.75:l.t;
      const mnt=ta?(ta.mode==='tonne'?t*ta.prix:vol*ta.prix):0;
      const qte=l.saisieMode==='pes'?t.toFixed(1):vol.toFixed(0);
      detailRows.push([bul.num,bul.date,l.type==='deblais'?l.lieu:l.mat,parseFloat(qte),ta?.unit||'?',ta?.prix||0,parseFloat(mnt.toFixed(2))]);
    });
  });
  const ws2=XLSX.utils.aoa_to_sheet(detailRows);
  ws2['!cols']=[{wch:16},{wch:10},{wch:28},{wch:10},{wch:6},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws2,'Détail bulletins');

  XLSX.writeFile(wb,`Facturation_${tr?.nom?.replace(/\s/g,'_')}_${ch?.code}_${new Date().toISOString().split('T')[0]}.xlsx`);
  addAudit(`Excel facturation ${tr?.nom}/${ch?.nom} exporté`,'info');
  toast('Excel facturation téléchargé ✓','g');
}

// ─ Excel : Taxes ──────────────────────────────────────────────────────────────
function exportTaxesExcel(cId){
  if(!window.XLSX){toast('Chargement Excel...','g');setTimeout(()=>exportTaxesExcel(cId),800);return;}
  const ch=D.chantiers.find(c=>c.id===cId);
  const grille=TAXES_GRILLE[cId]||{};
  const lignes=calcTaxesBulletins(cId);
  const totalTaxes=lignes.reduce((s,l)=>s+l.mnt,0);
  const wb=XLSX.utils.book_new();

  // Sheet 1 : Grille
  const grilleRows=[['GRILLE TARIFAIRE — TAXES DE DÉCHARGE'],
    ['Chantier',`${ch?.code} — ${ch?.nom}`],[''],
    ['LIEU DE DÉCHARGE','UNITÉ','TARIF CHF','NOTE']];
  Object.entries(grille).forEach(([lieu,tx])=>grilleRows.push([lieu,tx.unit==='t'?'CHF/tonne':'CHF/m³',tx.tarif,tx.note||'']));
  const ws1=XLSX.utils.aoa_to_sheet(grilleRows);
  ws1['!cols']=[{wch:30},{wch:12},{wch:12},{wch:28}];
  XLSX.utils.book_append_sheet(wb,ws1,'Grille tarifaire');

  // Sheet 2 : Détail
  const detailRows=[['BULLETIN','DATE','TRANSPORTEUR','LIEU DE DÉCHARGE','CLASSIFICATION','TONNES','VOLUME m³','TARIF','TAXE HT']];
  lignes.forEach(l=>{
    const lieuInfo=LIEUX_DECHARGE.find(x=>x.nom===l.lieu);
    detailRows.push([l.bul.num,l.date,l.transporteur,l.lieu,
      lieuInfo?.type==='A'?'Type A':lieuInfo?.type==='B'?'Type B':'Autre',
      parseFloat(l.totalT.toFixed(1)),parseFloat(l.totalV.toFixed(1)),
      l.hasTarif?l.tarif:'Manquant',l.hasTarif?parseFloat(l.mnt.toFixed(2)):0]);
  });
  detailRows.push(['','','','','','','','TOTAL HT',parseFloat(totalTaxes.toFixed(2))]);
  detailRows.push(['','','','','','','','TVA 8.1%',parseFloat((totalTaxes*.081).toFixed(2))]);
  detailRows.push(['','','','','','','','TOTAL TTC',parseFloat((totalTaxes*1.081).toFixed(2))]);
  const ws2=XLSX.utils.aoa_to_sheet(detailRows);
  ws2['!cols']=[{wch:16},{wch:10},{wch:22},{wch:28},{wch:10},{wch:8},{wch:10},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws2,'Détail taxes');

  XLSX.writeFile(wb,`Taxes_${ch?.code}_${new Date().toISOString().split('T')[0]}.xlsx`);
  addAudit(`Excel taxes ${ch?.nom} exporté`,'info');
  toast('Excel taxes téléchargé ✓','g');
}
